name: Diagnose Quote Clock Format

on:
  push:
    branches:
      - auto/research/20260724-11-quote-clock-exactness

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Capture Ruff output
        shell: bash
        run: |
          set +e
          ruff check . > ruff-check.txt 2>&1
          echo $? > ruff-check-exit.txt
          ruff format --check . > ruff-format.txt 2>&1
          echo $? > ruff-format-exit.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: quote-clock-ruff-diagnostics-${{ github.run_id }}
          path: |
            ruff-check.txt
            ruff-check-exit.txt
            ruff-format.txt
            ruff-format-exit.txt
          if-no-files-found: error
          retention-days: 1
