name: Temporary PR112 Diagnostic

on:
  push:
    branches:
      - auto/testing/20260722-17-holdout-candidate-validation

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Run focused tests and capture output
        id: focused
        shell: bash
        run: |
          set +e
          pytest -vv tests/test_holdout_candidate_validation.py > pr112-diagnostic.txt 2>&1
          status=$?
          cat pr112-diagnostic.txt
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: pr112-diagnostic-${{ github.sha }}
          path: pr112-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
      - name: Preserve focused failure status
        if: steps.focused.outputs.status != '0'
        run: exit 1
