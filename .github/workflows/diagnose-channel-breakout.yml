name: Diagnose Channel Breakout Tests

on:
  push:
    branches:
      - auto/research/20260724-15-breakout-trend

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - name: Capture focused failure
        run: |
          set +e
          pytest -vv tests/test_channel_breakout_trend_1h_report.py > /tmp/channel-breakout-test.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            printf 'focused tests passed\n' > /tmp/channel-breakout-test.log
          fi
          mkdir -p .ci
          cp /tmp/channel-breakout-test.log .ci/channel-breakout-test.log
      - name: Commit diagnostic once
        run: |
          if git diff --quiet -- .ci/channel-breakout-test.log; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .ci/channel-breakout-test.log
          git commit -m "ci: capture channel breakout test diagnostic"
          git push
