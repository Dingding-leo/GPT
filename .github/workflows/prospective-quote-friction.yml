name: Prospective Quote Friction

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/prospective-quote-friction.yml"
      - "reports/research/prospective-top-of-book-friction/**"
      - "tests/test_prospective_top_of_book_friction.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prospective-quote-friction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PIP_BOOTSTRAP_VERSION: "26.1.2"
      ARTIFACT_NAME: prospective-quote-friction-${{ github.run_number }}-attempt-${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          set -euo pipefail
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Validate repository and protocol
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .
          pytest -q tests/test_prospective_top_of_book_friction.py

      - name: Collect bounded public quote evidence
        id: collect
        env:
          OKX_BASE_URL: https://www.okx.com
        run: |
          set +e
          python reports/research/prospective-top-of-book-friction/analysis.py \
            --output-dir /tmp/prospective-quote-friction
          status=$?
          set -e
          echo "hypothesis_exit_code=${status}" >> "$GITHUB_OUTPUT"
          test -s /tmp/prospective-quote-friction/result.json

      - name: Record workflow provenance
        env:
          HYPOTHESIS_EXIT_CODE: ${{ steps.collect.outputs.hypothesis_exit_code }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("/tmp/prospective-quote-friction/workflow-provenance.json")
          payload = {
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "tested_sha": os.environ["GITHUB_SHA"],
              "head_sha": os.environ.get("GITHUB_HEAD_REF", ""),
              "hypothesis_exit_code": int(os.environ["HYPOTHESIS_EXIT_CODE"]),
          }
          path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Upload prospective evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp/prospective-quote-friction/
          if-no-files-found: error
          retention-days: 14
