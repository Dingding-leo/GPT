name: Maker Replay Diagnostic

on:
  pull_request:
    branches: [auto/backtest/20260724-14-trade-through-maker-replay]

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Capture diagnostics
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          mkdir -p diagnostic/formatted/scripts diagnostic/formatted/tests
          ruff check \
            scripts/build_maker_replay_gate.py \
            tests/test_maker_fill_replay.py \
            tests/test_maker_replay_gate.py \
            tests/test_maker_replay_workflow.py \
            > diagnostic/ruff-check.txt 2>&1 || true
          ruff format \
            scripts/build_maker_replay_gate.py \
            tests/test_maker_fill_replay.py \
            tests/test_maker_replay_gate.py \
            tests/test_maker_replay_workflow.py
          cp scripts/build_maker_replay_gate.py diagnostic/formatted/scripts/
          cp tests/test_maker_replay_gate.py diagnostic/formatted/tests/
          cp tests/test_maker_replay_workflow.py diagnostic/formatted/tests/
          ruff format --check \
            scripts/build_maker_replay_gate.py \
            tests/test_maker_fill_replay.py \
            tests/test_maker_replay_gate.py \
            tests/test_maker_replay_workflow.py \
            > diagnostic/ruff-format.txt 2>&1 || true
          pytest -q \
            tests/test_maker_fill_replay.py \
            tests/test_maker_replay_gate.py \
            tests/test_maker_replay_workflow.py \
            > diagnostic/pytest.txt 2>&1 || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maker-replay-diagnostic
          path: diagnostic/
          if-no-files-found: error
          retention-days: 1
