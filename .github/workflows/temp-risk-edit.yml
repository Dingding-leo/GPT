name: Temporary Risk Edit Committer

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'auto/risk/20260722-11-nonvacuous-concentration'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source branch
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: auto/risk/20260722-11-nonvacuous-concentration
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Apply bounded risk change
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          source = Path("src/gpt_quant/portfolio.py")
          text = source.read_text(encoding="utf-8")
          import_target = "import math\nfrom collections.abc import Iterable, Mapping\n"
          if import_target not in text:
              raise RuntimeError("portfolio import target not found")
          text = text.replace(import_target, import_target + "from numbers import Real\n", 1)
          old_weights = (
              "    weights = pd.Series({name: float(initial_weights[name]) for name in names}, "
              "dtype=float)\n"
              "    if not np.isfinite(weights.to_numpy()).all() or (weights < 0.0).any():\n"
              "        raise ValueError(\"initial weights must be finite and non-negative\")\n"
          )
          new_weights = (
              "    raw_weights = [initial_weights[name] for name in names]\n"
              "    if any(\n"
              "        isinstance(value, bool) or not isinstance(value, Real)\n"
              "        for value in raw_weights\n"
              "    ):\n"
              "        raise ValueError(\"initial weights must be strictly positive real numbers\")\n"
              "    weights = pd.Series({name: float(initial_weights[name]) for name in names}, "
              "dtype=float)\n"
              "    if not np.isfinite(weights.to_numpy()).all() or (weights <= 0.0).any():\n"
              "        raise ValueError(\"initial weights must be strictly positive real numbers\")\n"
          )
          if old_weights not in text:
              raise RuntimeError("initial-weight validation target not found")
          text = text.replace(old_weights, new_weights, 1)
          old_cap = (
              "    if not math.isfinite(float(max_sleeve_weight)) or not 0.0 < "
              "max_sleeve_weight <= 1.0:\n"
              "        raise ValueError(\"max_sleeve_weight must be finite and in (0, 1]\")\n"
          )
          new_cap = (
              "    if (\n"
              "        isinstance(max_sleeve_weight, bool)\n"
              "        or not isinstance(max_sleeve_weight, Real)\n"
              "        or not math.isfinite(float(max_sleeve_weight))\n"
              "        or not 0.0 < float(max_sleeve_weight) < 1.0\n"
              "    ):\n"
              "        raise ValueError(\n"
              "            \"max_sleeve_weight must be a finite real number in (0, 1)\"\n"
              "        )\n"
              "    max_sleeve_weight = float(max_sleeve_weight)\n"
          )
          if old_cap not in text:
              raise RuntimeError("concentration-cap validation target not found")
          source.write_text(text.replace(old_cap, new_cap, 1), encoding="utf-8")

          Path("tests/test_portfolio_constraints.py").write_text(
              dedent(
                  '''\
                  from __future__ import annotations

                  import json
                  from pathlib import Path

                  import pandas as pd
                  import pytest

                  import gpt_quant.portfolio as portfolio
                  from gpt_quant.portfolio import (
                      build_buy_and_hold_sleeve_portfolio,
                      load_verified_return_csv,
                  )

                  _FIXTURE_DIR = (
                      Path(__file__).parent
                      / "fixtures"
                      / "okx"
                      / "btc_eth_oos_20200111_20200219"
                  )


                  def _load_fixture_returns() -> tuple[pd.Series, pd.Series, dict[str, object]]:
                      metadata = json.loads(
                          (_FIXTURE_DIR / "metadata.json").read_text(encoding="utf-8")
                      )
                      instruments = metadata["instruments"]
                      btc = load_verified_return_csv(
                          _FIXTURE_DIR / "btc_usdt_returns.csv",
                          expected_sha256=instruments["BTC-USDT"]["fixture_sha256"],
                      )
                      eth = load_verified_return_csv(
                          _FIXTURE_DIR / "eth_usdt_returns.csv",
                          expected_sha256=instruments["ETH-USDT"]["fixture_sha256"],
                      )
                      return btc, eth, metadata


                  def _fixture_provenance(metadata: dict[str, object]) -> dict[str, object]:
                      instruments = metadata["instruments"]
                      return {
                          "provider": metadata["provider"],
                          "market_type": metadata["market_type"],
                          "timeframe": metadata["timeframe"],
                          "source_workflow_run_id": metadata["source_workflow_run_id"],
                          "source_artifact_id": metadata["source_artifact_id"],
                          "source_artifact_name": metadata["source_artifact_name"],
                          "source_artifact_sha256": metadata["source_artifact_sha256"],
                          "source_head_sha": metadata["source_head_sha"],
                          "return_file_sha256": {
                              name: details["fixture_sha256"]
                              for name, details in instruments.items()
                          },
                      }


                  def _fail_if_metrics_run(*args: object, **kwargs: object) -> None:
                      pytest.fail("portfolio metrics ran before constraint validation")


                  @pytest.mark.parametrize(
                      "weights",
                      [
                          {"BTC-USDT": True, "ETH-USDT": False},
                          {"BTC-USDT": 1.0, "ETH-USDT": 0.0},
                          {"BTC-USDT": 0.0, "ETH-USDT": 1.0},
                      ],
                  )
                  def test_portfolio_rejects_degenerate_initial_weights_before_metrics(
                      weights: dict[str, float],
                      monkeypatch: pytest.MonkeyPatch,
                  ) -> None:
                      btc, eth, metadata = _load_fixture_returns()
                      monkeypatch.setattr(portfolio, "performance_metrics", _fail_if_metrics_run)

                      with pytest.raises(ValueError, match="strictly positive real numbers"):
                          build_buy_and_hold_sleeve_portfolio(
                              {"BTC-USDT": btc, "ETH-USDT": eth},
                              initial_weights=weights,
                              provenance=_fixture_provenance(metadata),
                          )


                  @pytest.mark.parametrize("cap", [True, 1.0])
                  def test_portfolio_rejects_vacuous_concentration_cap_before_metrics(
                      cap: float,
                      monkeypatch: pytest.MonkeyPatch,
                  ) -> None:
                      btc, eth, metadata = _load_fixture_returns()
                      monkeypatch.setattr(portfolio, "performance_metrics", _fail_if_metrics_run)

                      with pytest.raises(ValueError, match=r"finite real number in \(0, 1\)"):
                          build_buy_and_hold_sleeve_portfolio(
                              {"BTC-USDT": btc, "ETH-USDT": eth},
                              initial_weights={"BTC-USDT": 0.5, "ETH-USDT": 0.5},
                              max_sleeve_weight=cap,
                              provenance=_fixture_provenance(metadata),
                          )


                  def test_non_vacuous_concentration_cap_preserves_valid_portfolio() -> None:
                      btc, eth, metadata = _load_fixture_returns()
                      result = build_buy_and_hold_sleeve_portfolio(
                          {"BTC-USDT": btc, "ETH-USDT": eth},
                          initial_weights={"BTC-USDT": 0.5, "ETH-USDT": 0.5},
                          max_sleeve_weight=0.75,
                          provenance=_fixture_provenance(metadata),
                      )

                      assert result.settings["max_sleeve_weight"] == pytest.approx(0.75)
                      assert result.concentration[
                          "maximum_allowed_sleeve_weight"
                      ] == pytest.approx(0.75)
                      assert all(
                          weight > 0.0 for weight in result.settings["initial_weights"].values()
                      )
                  '''
              ),
              encoding="utf-8",
          )
          PY
      - name: Format and verify focused change
        run: |
          ruff check --fix src/gpt_quant/portfolio.py tests/test_portfolio_constraints.py
          ruff format src/gpt_quant/portfolio.py tests/test_portfolio_constraints.py
          ruff check src/gpt_quant/portfolio.py tests/test_portfolio_constraints.py
          ruff format --check src/gpt_quant/portfolio.py tests/test_portfolio_constraints.py
          pytest -q tests/test_portfolio_constraints.py
      - name: Commit verified change and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gpt_quant/portfolio.py tests/test_portfolio_constraints.py
          git rm .github/workflows/temp-risk-edit.yml
          git commit -m "fix(risk): reject degenerate portfolio constraints"
          git push origin HEAD:auto/risk/20260722-11-nonvacuous-concentration
