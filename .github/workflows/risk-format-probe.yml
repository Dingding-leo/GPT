name: Risk Format Probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Capture and apply exact Ruff output
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install "ruff==0.16.0"
          mkdir -p /tmp/risk-format/src/gpt_quant /tmp/risk-format/tests
          cp src/gpt_quant/paper_risk_session_gate.py /tmp/risk-format/src/gpt_quant/
          cp tests/test_paper_risk_session_gate.py /tmp/risk-format/tests/
          ruff check \
            src/gpt_quant/paper_risk_session_gate.py \
            tests/test_paper_risk_session_gate.py \
            > /tmp/risk-format/ruff-check.txt 2>&1 || true
          ruff format --check \
            src/gpt_quant/paper_risk_session_gate.py \
            tests/test_paper_risk_session_gate.py \
            > /tmp/risk-format/ruff-format-check.txt 2>&1 || true
          ruff check --fix --config pyproject.toml \
            /tmp/risk-format/src/gpt_quant/paper_risk_session_gate.py \
            /tmp/risk-format/tests/test_paper_risk_session_gate.py
          ruff format --config pyproject.toml \
            /tmp/risk-format/src/gpt_quant/paper_risk_session_gate.py \
            /tmp/risk-format/tests/test_paper_risk_session_gate.py

      - name: Upload probe result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-format-probe
          path: /tmp/risk-format
          if-no-files-found: error
          retention-days: 1
