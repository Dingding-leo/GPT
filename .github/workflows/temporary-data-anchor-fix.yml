name: Temporary Data Anchor Fix

on:
  push:
    branches:
      - auto/data/20260722-18-reject-shifted-1dutc-bars

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[data-anchor-applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: auto/data/20260722-18-reject-shifted-1dutc-bars
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Apply bounded source and test changes
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/gpt_quant/okx.py")
          source = source_path.read_text(encoding="utf-8")
          constants_old = '''_COLUMNS = (
              "ts",
              "open",
              "high",
              "low",
              "close",
              "volume_base",
              "volume_quote",
              "volume_quote_alt",
              "confirm",
          )
          '''
          constants_new = constants_old + '_MILLISECONDS_PER_DAY = 86_400_000\n'
          if source.count(constants_old) != 1:
              raise SystemExit("expected one OKX column constant block")
          source = source.replace(constants_old, constants_new, 1)

          helper_anchor = '''def parse_okx_candle_rows(rows: Sequence[Sequence[Any]]) -> pd.DataFrame:
          '''
          helper = '''def _validate_okx_bar_anchor(timestamp_ms: int, *, bar: str) -> None:
              if bar == "1Dutc" and timestamp_ms % _MILLISECONDS_PER_DAY != 0:
                  raise ValueError(
                      "OKX 1Dutc candle timestamps must be aligned to midnight UTC"
                  )


          def parse_okx_candle_rows(rows: Sequence[Sequence[Any]]) -> pd.DataFrame:
          '''
          if source.count(helper_anchor) != 1:
              raise SystemExit("expected one parser definition")
          source = source.replace(helper_anchor, helper, 1)

          timestamp_old = '''            try:
                          timestamp = _coerce_okx_timestamp_ms(row[0])
                      except (TypeError, ValueError) as exc:
                          raise ValueError("OKX candle response contains an invalid timestamp") from exc
                      normalized_row = tuple(row)
          '''
          timestamp_new = '''            try:
                          timestamp = _coerce_okx_timestamp_ms(row[0])
                      except (TypeError, ValueError) as exc:
                          raise ValueError("OKX candle response contains an invalid timestamp") from exc
                      _validate_okx_bar_anchor(timestamp, bar=bar)
                      normalized_row = tuple(row)
          '''
          if source.count(timestamp_old) != 1:
              raise SystemExit("expected one downloader timestamp block")
          source = source.replace(timestamp_old, timestamp_new, 1)
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/test_okx_1dutc_anchor.py")
          test_path.write_text(
              '''from __future__ import annotations

          import hashlib
          import json
          from pathlib import Path

          import pytest

          from gpt_quant.okx import fetch_okx_history_candles

          _FIXTURE_DIR = (
              Path(__file__).parent
              / "fixtures"
              / "okx"
              / "btc-usdt-1dutc-raw-20260717-20260721"
          )
          _ROWS_PATH = _FIXTURE_DIR / "rows.json"
          _METADATA_PATH = _FIXTURE_DIR / "metadata.json"
          _EXPECTED_FIXTURE_SHA256 = (
              "dcb30e58e10f8415aefe8c206f99c21fc8862b3b4f5ea65679a01262980c5481"
          )
          _MILLISECONDS_PER_HOUR = 3_600_000


          def _real_okx_rows() -> list[list[str]]:
              rows_bytes = _ROWS_PATH.read_bytes()
              metadata = json.loads(_METADATA_PATH.read_text(encoding="utf-8"))

              assert metadata["provider"] == "OKX"
              assert metadata["instrument_id"] == "BTC-USDT"
              assert metadata["bar"] == "1Dutc"
              assert metadata["fixture_rows_sha256"] == _EXPECTED_FIXTURE_SHA256
              assert hashlib.sha256(rows_bytes).hexdigest() == _EXPECTED_FIXTURE_SHA256

              rows = json.loads(rows_bytes)
              assert len(rows) == metadata["observations"]
              return [list(row) for row in rows]


          def test_okx_1dutc_rejects_candles_shifted_from_midnight_utc() -> None:
              shifted_rows = _real_okx_rows()
              for row in shifted_rows:
                  row[0] = str(int(row[0]) + _MILLISECONDS_PER_HOUR)

              def fake_getter(url: str, timeout: float) -> dict[str, object]:
                  return {"code": "0", "msg": "", "data": shifted_rows}

              with pytest.raises(ValueError, match="midnight UTC"):
                  fetch_okx_history_candles(
                      inst_id="BTC-USDT",
                      bar="1Dutc",
                      limit=len(shifted_rows),
                      max_pages=1,
                      pause_seconds=0.0,
                      get_json=fake_getter,
                  )
          ''',
              encoding="utf-8",
          )
          PY
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Format and validate focused change
        run: |
          ruff format src/gpt_quant/okx.py tests/test_okx_1dutc_anchor.py
          ruff check src/gpt_quant/okx.py tests/test_okx_1dutc_anchor.py
          pytest -q tests/test_okx_1dutc_anchor.py tests/test_okx.py
      - name: Commit source and test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gpt_quant/okx.py tests/test_okx_1dutc_anchor.py
          git commit -m "fix(data): reject shifted 1Dutc bars [data-anchor-applied]"
          git push origin HEAD:auto/data/20260722-18-reject-shifted-1dutc-bars
