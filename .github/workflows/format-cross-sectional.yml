name: Format Cross Sectional Diagnostic

on:
  push:
    branches:
      - auto/research/20260724-15-cross-sectional-leader

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: true
          ref: auto/research/20260724-15-cross-sectional-leader
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install -e ".[dev]"
          python -m pip check
      - name: Correct transported source and apply repository Ruff rules
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("reports/research/cross-sectional-leader-rotation-1h/analysis.py")
          content = path.read_text(encoding="utf-8")
          malformed = "float(row_volatilityleader])"
          if malformed in content:
              path.write_text(
                  content.replace(malformed, "float(row_volatility[leader])"),
                  encoding="utf-8",
              )
          PY
          ruff check --fix reports/research/cross-sectional-leader-rotation-1h
          ruff format reports/research/cross-sectional-leader-rotation-1h
          python -m py_compile \
            reports/research/cross-sectional-leader-rotation-1h/analysis.py \
            reports/research/cross-sectional-leader-rotation-1h/test_report.py
          pytest -q reports/research/cross-sectional-leader-rotation-1h/test_report.py
      - name: Commit exact formatter output
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/research/cross-sectional-leader-rotation-1h
          if git diff --cached --quiet; then
            echo "No formatter changes required"
            exit 0
          fi
          git commit -m "style(research): apply exact Ruff output"
          git push origin HEAD:auto/research/20260724-15-cross-sectional-leader
