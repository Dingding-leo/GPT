name: Format Cross Sectional Diagnostic

on:
  push:
    branches:
      - auto/research/20260724-15-cross-sectional-leader

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install -e ".[dev]"
          python -m pip check
      - name: Apply repository Ruff rules
        run: |
          ruff check --fix reports/research/cross-sectional-leader-rotation-1h
          ruff format reports/research/cross-sectional-leader-rotation-1h
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatted-cross-sectional
          path: reports/research/cross-sectional-leader-rotation-1h
          if-no-files-found: error
