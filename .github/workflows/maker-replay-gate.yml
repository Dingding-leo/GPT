name: Maker Replay Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maker-replay-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PIP_BOOTSTRAP_VERSION: "26.1.2"
      EVIDENCE_DIR: reports/paper/maker-replay
      REBUILT_DIR: /tmp/maker-replay-rebuilt
      ARTIFACT_NAME: maker-replay-${{ github.run_number }}-attempt-${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          set -euo pipefail
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Lint and test maker replay gate
        run: |
          set -euo pipefail
          ruff check \
            scripts/build_maker_replay_gate.py \
            tests/test_maker_fill_replay.py \
            tests/test_maker_replay_gate.py \
            tests/test_maker_replay_workflow.py
          ruff format --check \
            scripts/build_maker_replay_gate.py \
            tests/test_maker_fill_replay.py \
            tests/test_maker_replay_gate.py \
            tests/test_maker_replay_workflow.py
          pytest -q \
            tests/test_maker_fill_replay.py \
            tests/test_maker_replay_gate.py \
            tests/test_maker_replay_workflow.py

      - name: Build immutable maker replay evidence
        id: evidence
        run: |
          set -euo pipefail
          output="$(python scripts/build_maker_replay_gate.py \
            --source-response tests/fixtures/okx/trades-btc-usdt-docs-20220602/response.json \
            --source-metadata tests/fixtures/okx/trades-btc-usdt-docs-20220602/metadata.json \
            --output-dir "$EVIDENCE_DIR")"
          printf '%s\n' "$output"
          manifest_sha256="$(python -c 'import json,sys; print(json.loads(sys.argv[1])["manifest_sha256"])' "$output")"
          [[ "$manifest_sha256" =~ ^[0-9a-f]{64}$ ]]
          printf 'manifest_sha256=%s\n' "$manifest_sha256" >> "$GITHUB_OUTPUT"

      - name: Verify persisted maker replay evidence
        run: |
          set -euo pipefail
          python scripts/build_maker_replay_gate.py \
            --output-dir "$EVIDENCE_DIR" \
            --verify-only
          (
            cd "$EVIDENCE_DIR"
            sha256sum --check artifact-manifest.sha256
          )

      - name: Prove deterministic regeneration
        run: |
          set -euo pipefail
          python scripts/build_maker_replay_gate.py \
            --source-response tests/fixtures/okx/trades-btc-usdt-docs-20220602/response.json \
            --source-metadata tests/fixtures/okx/trades-btc-usdt-docs-20220602/metadata.json \
            --output-dir "$REBUILT_DIR"
          diff -ru "$EVIDENCE_DIR" "$REBUILT_DIR"

      - name: Upload immutable maker replay evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.EVIDENCE_DIR }}/
          if-no-files-found: error
          retention-days: 14
