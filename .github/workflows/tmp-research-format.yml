name: Temporary Research Formatter

on:
  push:
    branches:
      - auto/research/20260723-01-positive-fold-breadth

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Apply Ruff fixes and formatting
        run: |
          ruff check --fix reports/research/fold-positive-breadth/analysis.py tests/test_fold_positive_breadth_report.py
          ruff format reports/research/fold-positive-breadth/analysis.py tests/test_fold_positive_breadth_report.py
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fold-positive-breadth-formatted-${{ github.sha }}
          path: |
            reports/research/fold-positive-breadth/analysis.py
            tests/test_fold_positive_breadth_report.py
          if-no-files-found: error
          retention-days: 1
