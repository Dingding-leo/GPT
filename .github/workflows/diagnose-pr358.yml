name: Diagnose PR 358 tests

on:
  push:
    branches:
      - auto/live/20260724-06-okx-top-of-book

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run tests and preserve log
        id: tests
        shell: bash
        run: |
          set +e
          pytest > pytest-pr358.log 2>&1
          status=$?
          cat pytest-pr358.log
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-pr358-${{ github.run_number }}
          path: pytest-pr358.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail on test failure
        if: ${{ steps.tests.outputs.status != '0' }}
        run: exit 1
