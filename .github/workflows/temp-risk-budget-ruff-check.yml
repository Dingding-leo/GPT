name: Temporary Risk Budget Ruff Check

on:
  push:
    branches: [auto/research/20260724-08-ex-ante-risk-budget]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: auto/research/20260724-08-ex-ante-risk-budget
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply focused Ruff formatting
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          ruff format \
            reports/research/ex_ante_risk_budget_overlay/analysis.py \
            tests/test_ex_ante_risk_budget_overlay_report.py
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            reports/research/ex_ante_risk_budget_overlay/analysis.py \
            tests/test_ex_ante_risk_budget_overlay_report.py
          git commit -m "style(research): apply exact Ruff formatting"
          git push origin HEAD:auto/research/20260724-08-ex-ante-risk-budget
