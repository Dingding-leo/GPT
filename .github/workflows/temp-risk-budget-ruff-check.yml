name: Temporary Risk Budget Ruff Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Capture focused Ruff diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          ruff check --output-format=json \
            reports/research/ex_ante_risk_budget_overlay/analysis.py \
            tests/test_ex_ante_risk_budget_overlay_report.py \
            > /tmp/risk-budget-ruff.json || true

      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-budget-ruff-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: /tmp/risk-budget-ruff.json
          if-no-files-found: error
          retention-days: 1
