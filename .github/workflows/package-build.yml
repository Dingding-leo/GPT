name: Python Package Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-package-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribution:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    env:
      PIP_BOOTSTRAP_VERSION: "26.1.2"
      BUILD_FRONTEND_VERSION: "1.5.0"
      BUILD_BACKEND_VERSION: "83.0.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install \
            "build==${BUILD_FRONTEND_VERSION}" \
            "setuptools==${BUILD_BACKEND_VERSION}"
          python -m pip check
          python -c 'import os, setuptools; assert setuptools.__version__ == os.environ["BUILD_BACKEND_VERSION"]'
          python -m build --no-isolation

      - name: Generate canonical Ruff diagnostic
        if: ${{ matrix.python-version == '3.11' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          ruff check --fix \
            src/gpt_quant/paper_execution_reconciliation.py \
            tests/test_paper_execution_reconciliation.py || true
          ruff format \
            src/gpt_quant/paper_execution_reconciliation.py \
            tests/test_paper_execution_reconciliation.py
          mkdir -p /tmp/ruff-canonical/src/gpt_quant /tmp/ruff-canonical/tests
          cp src/gpt_quant/paper_execution_reconciliation.py /tmp/ruff-canonical/src/gpt_quant/
          cp tests/test_paper_execution_reconciliation.py /tmp/ruff-canonical/tests/
          ruff check \
            src/gpt_quant/paper_execution_reconciliation.py \
            tests/test_paper_execution_reconciliation.py \
            > /tmp/ruff-canonical/ruff-check.txt 2>&1 || true

      - name: Upload canonical Ruff diagnostic
        if: ${{ matrix.python-version == '3.11' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-canonical-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: /tmp/ruff-canonical/
          if-no-files-found: error
          retention-days: 1

      - name: Verify distributions and wheel environment
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          sdists=(dist/gpt_quant_lab-*.tar.gz)
          wheels=(dist/gpt_quant_lab-*.whl)
          test "${#sdists[@]}" -eq 1
          test "${#wheels[@]}" -eq 1
          tar -tzf "${sdists[0]}" > /tmp/gpt-sdist-members.txt
          grep -Eq '/pyproject\.toml$' /tmp/gpt-sdist-members.txt
          grep -Eq '/src/gpt_quant/__init__\.py$' /tmp/gpt-sdist-members.txt
          python -m venv /tmp/gpt-wheel-venv
          /tmp/gpt-wheel-venv/bin/python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          /tmp/gpt-wheel-venv/bin/python -m pip install "${wheels[0]}"
          /tmp/gpt-wheel-venv/bin/python -m pip check
          /tmp/gpt-wheel-venv/bin/python - <<'PY'
          from pathlib import Path

          import gpt_quant

          module_path = Path(gpt_quant.__file__).resolve()
          venv_path = Path("/tmp/gpt-wheel-venv").resolve()
          if not module_path.is_relative_to(venv_path):
              raise SystemExit(f"gpt_quant imported outside wheel venv: {module_path}")
          print(module_path)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gpt-quant-distributions-py${{ matrix.python-version }}-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error
          retention-days: 14
