name: Python Package Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-package-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIP_BOOTSTRAP_VERSION: "26.1.2"
      BUILD_FRONTEND_VERSION: "1.5.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install "build==${BUILD_FRONTEND_VERSION}"
          python -m build

      - name: Verify distributions and wheel environment
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          sdists=(dist/gpt_quant_lab-*.tar.gz)
          wheels=(dist/gpt_quant_lab-*.whl)
          test "${#sdists[@]}" -eq 1
          test "${#wheels[@]}" -eq 1
          tar -tzf "${sdists[0]}" > /tmp/gpt-sdist-members.txt
          grep -Eq '/pyproject\.toml$' /tmp/gpt-sdist-members.txt
          grep -Eq '/src/gpt_quant/__init__\.py$' /tmp/gpt-sdist-members.txt
          python -m venv /tmp/gpt-wheel-venv
          /tmp/gpt-wheel-venv/bin/python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          /tmp/gpt-wheel-venv/bin/python -m pip install "${wheels[0]}"
          /tmp/gpt-wheel-venv/bin/python -m pip check
          /tmp/gpt-wheel-venv/bin/python - <<'PY'
          from pathlib import Path

          import gpt_quant

          module_path = Path(gpt_quant.__file__).resolve()
          venv_path = Path("/tmp/gpt-wheel-venv").resolve()
          if not module_path.is_relative_to(venv_path):
              raise SystemExit(f"gpt_quant imported outside wheel venv: {module_path}")
          print(module_path)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gpt-quant-distributions-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error
          retention-days: 14
