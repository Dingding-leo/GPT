name: Python Package Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_sha:
        description: Full 40-character commit SHA to verify; defaults to the dispatched ref
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: python-package-${{ github.event_name }}-${{ inputs.target_sha || github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  distribution:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    env:
      EXPECTED_TESTED_SHA: ${{ inputs.target_sha || github.event.pull_request.head.sha || github.sha }}
      REQUESTED_TARGET_SHA: ${{ inputs.target_sha || '' }}
      DISPATCH_REF_SHA: ${{ github.sha }}
      PIP_BOOTSTRAP_VERSION: "26.1.2"
      BUILD_FRONTEND_VERSION: "1.5.0"
      BUILD_BACKEND_VERSION: "83.0.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.EXPECTED_TESTED_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact checked-out revision
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_TESTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$EXPECTED_TESTED_SHA"
          if [[ -n "$REQUESTED_TARGET_SHA" ]]; then
            test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
            test "$GITHUB_REF" = "refs/heads/main"
            test "$REQUESTED_TARGET_SHA" = "$EXPECTED_TESTED_SHA"
            [[ "$DISPATCH_REF_SHA" =~ ^[0-9a-f]{40}$ ]]
            git cat-file -e "${DISPATCH_REF_SHA}^{commit}"
            git merge-base --is-ancestor "$EXPECTED_TESTED_SHA" "$DISPATCH_REF_SHA"
          fi

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install \
            "build==${BUILD_FRONTEND_VERSION}" \
            "setuptools==${BUILD_BACKEND_VERSION}"
          python -m pip check
          python -c 'import os, setuptools; assert setuptools.__version__ == os.environ["BUILD_BACKEND_VERSION"]'
          python -m build --no-isolation

      - name: Verify distributions and wheel environment
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          sdists=(dist/gpt_quant_lab-*.tar.gz)
          wheels=(dist/gpt_quant_lab-*.whl)
          test "${#sdists[@]}" -eq 1
          test "${#wheels[@]}" -eq 1
          tar -tzf "${sdists[0]}" > /tmp/gpt-sdist-members.txt
          grep -Eq '/pyproject\.toml$' /tmp/gpt-sdist-members.txt
          grep -Eq '/src/gpt_quant/__init__\.py$' /tmp/gpt-sdist-members.txt
          python -m venv /tmp/gpt-wheel-venv
          /tmp/gpt-wheel-venv/bin/python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          /tmp/gpt-wheel-venv/bin/python -m pip install "${wheels[0]}"
          /tmp/gpt-wheel-venv/bin/python -m pip check
          /tmp/gpt-wheel-venv/bin/python - <<'PY'
          from pathlib import Path

          import gpt_quant

          module_path = Path(gpt_quant.__file__).resolve()
          venv_path = Path("/tmp/gpt-wheel-venv").resolve()
          if not module_path.is_relative_to(venv_path):
              raise SystemExit(f"gpt_quant imported outside wheel venv: {module_path}")
          print(module_path)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gpt-quant-distributions-py${{ matrix.python-version }}-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error
          retention-days: 14
