name: Performance Format Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
          cache: pip
      - name: Install formatter
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Format performance files
        run: |
          ruff format \
            benchmarks/run_walk_forward_cache_scaling.py \
            tests/test_walk_forward_cache_scaling_benchmark.py
          mkdir -p formatted/benchmarks formatted/tests
          cp benchmarks/run_walk_forward_cache_scaling.py formatted/benchmarks/
          cp tests/test_walk_forward_cache_scaling_benchmark.py formatted/tests/
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: performance-formatted-${{ github.run_id }}
          path: formatted
          if-no-files-found: error
          retention-days: 1
