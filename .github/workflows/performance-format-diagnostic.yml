name: Performance Format Diagnostic

on:
  push:
    branches:
      - auto/performance/20260724-08-cache-paper-attempt-bytes
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff>=0.9,<1"
      - run: |
          ruff check --fix \
            src/gpt_quant/paper_execution_attempt.py \
            tests/test_paper_execution_attempt.py \
            benchmarks/run_paper_execution_attempt_serialization.py
          ruff format \
            src/gpt_quant/paper_execution_attempt.py \
            tests/test_paper_execution_attempt.py \
            benchmarks/run_paper_execution_attempt_serialization.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: performance-formatted-files
          path: |
            src/gpt_quant/paper_execution_attempt.py
            tests/test_paper_execution_attempt.py
            benchmarks/run_paper_execution_attempt_serialization.py
          if-no-files-found: error
          retention-days: 1
