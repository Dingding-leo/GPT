name: Repair Channel Result Once

on:
  push:
    branches:
      - auto/research/20260724-15-breakout-trend

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Repair result and remove this workflow
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("reports/research/channel-breakout-trend-1h/result.json")
          text = path.read_text(encoding="utf-8").rstrip()
          try:
              data = json.loads(text)
          except json.JSONDecodeError:
              data = json.loads(text + "}")
          markets = data["markets"]
          for key in (
              "paper_testable",
              "prospective_execution_diagnostics",
              "rejection_reasons",
              "verdict",
          ):
              if key in markets:
                  data[key] = markets.pop(key)
          path.write_text(
              json.dumps(data, indent=2, sort_keys=True, allow_nan=False) + "\n",
              encoding="utf-8",
          )
          Path(".github/workflows/repair-channel-result-once.yml").unlink()
          PY
      - name: Commit final repaired tree
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            reports/research/channel-breakout-trend-1h/result.json \
            .github/workflows/repair-channel-result-once.yml
          git commit -m "fix(research): persist valid channel breakout result"
          git push
