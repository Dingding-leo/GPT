name: Security Lint Diagnostic

on:
  push:
    branches:
      - auto/architecture/20260724-10-paper-decision-domain

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install --quiet "ruff>=0.9,<1"

      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p security-lint-diagnostic
          ruff check \
            src/gpt_quant/_paper_decision_store_core.py \
            src/gpt_quant/paper_decision_store.py \
            tests/test_paper_decision_directory_security.py \
            > security-lint-diagnostic/check.txt 2>&1
          echo "$?" > security-lint-diagnostic/check-exit.txt
          ruff format --check \
            src/gpt_quant/_paper_decision_store_core.py \
            src/gpt_quant/paper_decision_store.py \
            tests/test_paper_decision_directory_security.py \
            > security-lint-diagnostic/format.txt 2>&1
          echo "$?" > security-lint-diagnostic/format-exit.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: security-lint-diagnostic-${{ github.run_id }}
          path: security-lint-diagnostic
          if-no-files-found: error
          retention-days: 1
