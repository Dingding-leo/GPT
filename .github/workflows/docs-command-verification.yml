name: Docs Command Verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Compile documented files
        run: |
          python -m py_compile \
            examples/okx_spot_instrument_replay.py \
            tests/test_okx_spot_instrument_replay_example.py

      - name: Run documented offline example
        run: |
          python examples/okx_spot_instrument_replay.py \
            --output-dir reports/examples/okx-spot-instrument \
            | tee /tmp/okx-paper-attempt-example.json

      - name: Run documented fail-closed regressions
        run: |
          pytest tests/test_okx_spot_instrument_replay_example.py \
            -k 'rejects_off_tick_limit_price or rejects_off_lot_partial_fill or rejects_requested_notional_below_declared_paper_floor' \
            | tee /tmp/okx-paper-attempt-pytest.txt

      - name: Upload command evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-command-evidence
          path: |
            /tmp/okx-paper-attempt-example.json
            /tmp/okx-paper-attempt-pytest.txt
          if-no-files-found: error
          retention-days: 1
