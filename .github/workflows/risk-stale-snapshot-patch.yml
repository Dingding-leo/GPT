name: Risk stale snapshot patch

on:
  pull_request:
    paths:
      - "src/gpt_quant/portfolio_target_risk.py"
      - "tests/test_portfolio_target_risk.py"
      - ".github/workflows/risk-stale-snapshot-patch.yml"

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install focused verification tools
        run: python -m pip install ruff==0.15.22 pytest==8.4.2
      - name: Apply stale portfolio snapshot gate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path("src/gpt_quant/portfolio_target_risk.py")
          text = source.read_text(encoding="utf-8")

          replacements = (
              ("_SCHEMA_VERSION = 2", "_SCHEMA_VERSION = 3"),
              (
                  "    maximum_position_mark_age_seconds: float\n    costs: ExecutionCostInputs\n",
                  "    maximum_position_mark_age_seconds: float\n"
                  "    maximum_portfolio_snapshot_age_seconds: float\n"
                  "    costs: ExecutionCostInputs\n",
              ),
              (
                  '            "maximum_position_mark_age_seconds",\n        ):',
                  '            "maximum_position_mark_age_seconds",\n'
                  '            "maximum_portfolio_snapshot_age_seconds",\n'
                  "        ):",
              ),
              (
                  '            "maximum_position_mark_age_seconds": self.maximum_position_mark_age_seconds,\n'
                  '            "costs": {',
                  '            "maximum_position_mark_age_seconds": self.maximum_position_mark_age_seconds,\n'
                  '            "maximum_portfolio_snapshot_age_seconds": (\n'
                  '                self.maximum_portfolio_snapshot_age_seconds\n'
                  '            ),\n'
                  '            "costs": {',
              ),
              (
                  "class TargetRiskDecision:\n    decision_id: str\n    allowed: bool",
                  "class TargetRiskDecision:\n"
                  "    decision_id: str\n"
                  "    decision_at_utc: datetime\n"
                  "    portfolio_snapshot_age_seconds: float\n"
                  "    allowed: bool",
              ),
              (
                  "    policy: PortfolioTargetRiskPolicy,\n) -> TargetRiskDecision:",
                  "    policy: PortfolioTargetRiskPolicy,\n"
                  "    decision_at_utc: datetime | str,\n"
                  ") -> TargetRiskDecision:",
              ),
              (
                  '    if not intents:\n        raise ValueError("portfolio target risk gate requires at least one intent")\n',
                  '    if not intents:\n'
                  '        raise ValueError("portfolio target risk gate requires at least one intent")\n'
                  '    decision_at = _required_utc_datetime(decision_at_utc, field_name="decision_at_utc")\n'
                  '    if snapshot.observed_at_utc > decision_at:\n'
                  '        raise ValueError("portfolio snapshot cannot be observed after the risk decision")\n'
                  '    portfolio_snapshot_age_seconds = (\n'
                  '        decision_at - snapshot.observed_at_utc\n'
                  '    ).total_seconds()\n',
              ),
              (
                  "    for intent in ordered_intents:\n        intent.assert_active_at(snapshot.observed_at_utc)",
                  "    for intent in ordered_intents:\n        intent.assert_active_at(decision_at)",
              ),
              (
                  "    all_instruments = sorted(set(projected_position_by_instrument) | set(limit_by_instrument))\n"
                  "    blockers: list[str] = []",
                  "    all_instruments = sorted(set(projected_position_by_instrument) | set(limit_by_instrument))\n"
                  "    blockers: list[str] = []\n"
                  "    if portfolio_snapshot_age_seconds > policy.maximum_portfolio_snapshot_age_seconds:\n"
                  '        blockers.append("stale_portfolio_snapshot")',
              ),
              (
                  "                snapshot.observed_at_utc - current_position_record.mark_observed_at_utc",
                  "                decision_at - current_position_record.mark_observed_at_utc",
              ),
              (
                  '                "snapshot_id": snapshot.snapshot_id,\n'
                  '                "policy_id": policy.policy_id,',
                  '                "snapshot_id": snapshot.snapshot_id,\n'
                  '                "policy_id": policy.policy_id,\n'
                  '                "decision_at_utc": _format_utc(decision_at),',
              ),
              (
                  "    return TargetRiskDecision(\n        decision_id=decision_id,\n        allowed=not blockers_tuple,",
                  "    return TargetRiskDecision(\n"
                  "        decision_id=decision_id,\n"
                  "        decision_at_utc=decision_at,\n"
                  "        portfolio_snapshot_age_seconds=portfolio_snapshot_age_seconds,\n"
                  "        allowed=not blockers_tuple,",
              ),
          )
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"source replacement count {count} for {old[:80]!r}")
              text = text.replace(old, new)
          source.write_text(text, encoding="utf-8")

          tests = Path("tests/test_portfolio_target_risk.py")
          text = tests.read_text(encoding="utf-8")
          old = '        "maximum_position_mark_age_seconds": 10.0,\n        "costs":'
          new = (
              '        "maximum_position_mark_age_seconds": 10.0,\n'
              '        "maximum_portfolio_snapshot_age_seconds": 10.0,\n'
              '        "costs":'
          )
          if text.count(old) != 1:
              raise SystemExit("test policy replacement mismatch")
          text = text.replace(old, new)
          if text.count("        policy=policy,\n    )") != 5:
              raise SystemExit("unexpected regular risk call count")
          text = text.replace(
              "        policy=policy,\n    )",
              "        policy=policy,\n"
              "        decision_at_utc=snapshot.observed_at_utc,\n"
              "    )",
          )
          old = "        (intent,), snapshot=snapshot, policy=stale_policy\n    )"
          new = (
              "        (intent,),\n"
              "        snapshot=snapshot,\n"
              "        policy=stale_policy,\n"
              "        decision_at_utc=snapshot.observed_at_utc,\n"
              "    )"
          )
          if text.count(old) != 1:
              raise SystemExit("compact stale call mismatch")
          text = text.replace(old, new)
          if text.count("            policy=stale_policy,\n        )") != 2:
              raise SystemExit("unexpected stale rejection call count")
          text = text.replace(
              "            policy=stale_policy,\n        )",
              "            policy=stale_policy,\n"
              "            decision_at_utc=snapshot.observed_at_utc,\n"
              "        )",
          )
          text = text.replace(
              "    assert len(decision.decision_id) == 64\n",
              "    assert len(decision.decision_id) == 64\n"
              "    assert decision.decision_at_utc == snapshot.observed_at_utc\n"
              "    assert decision.portfolio_snapshot_age_seconds == 0.0\n",
              1,
          )
          marker = "\ndef test_target_risk_snapshot_rejects_unreconciled_or_future_marked_state() -> None:\n"
          if text.count(marker) != 1:
              raise SystemExit("new regression insertion marker mismatch")
          regression = '''


def test_target_risk_gate_rejects_replayed_stale_portfolio_state() -> None:
    equity, mark_at, fixture_sha256 = _real_confirmed_btc_mark()
    snapshot = PaperPortfolioRiskSnapshot(
        observed_at_utc="2026-07-20T00:00:05Z",
        equity=equity,
        cash=equity * 0.5,
        positions=(
            _position(
                "BTC-USDT",
                gross_fraction=0.5,
                equity=equity,
                mark_price=equity,
                mark_observed_at_utc=mark_at,
                mark_source_sha256=fixture_sha256,
            ),
        ),
    )
    policy = _policy(
        InstrumentTargetRiskLimit("BTC-USDT", 1.0, equity),
        maximum_gross_notional=equity,
        maximum_position_mark_age_seconds=10.0,
        maximum_portfolio_snapshot_age_seconds=10.0,
    )
    intent = _intent("BTC-USDT", 0.5, source_data_sha256=fixture_sha256)

    decision = evaluate_target_position_intents(
        (intent,),
        snapshot=snapshot,
        policy=policy,
        decision_at_utc="2026-07-20T00:00:20Z",
    )

    assert decision.allowed is False
    assert decision.portfolio_snapshot_age_seconds == 15.0
    assert decision.instrument_measures[0].current_mark_age_seconds == 20.0
    assert decision.blockers == (
        "stale_portfolio_snapshot",
        "stale_position_mark:BTC-USDT",
    )

    with pytest.raises(ValueError, match="after the risk decision"):
        evaluate_target_position_intents(
            (intent,),
            snapshot=snapshot,
            policy=policy,
            decision_at_utc="2026-07-20T00:00:04Z",
        )
'''
          text = text.replace(marker, regression + marker)
          tests.write_text(text, encoding="utf-8")
          PY
          python -m ruff format src/gpt_quant/portfolio_target_risk.py tests/test_portfolio_target_risk.py
          python -m ruff check src/gpt_quant/portfolio_target_risk.py tests/test_portfolio_target_risk.py
          python -m ruff format --check src/gpt_quant/portfolio_target_risk.py tests/test_portfolio_target_risk.py
          PYTHONPATH=src python -m pytest -q tests/test_portfolio_target_risk.py
      - name: Commit verified risk change
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/risk-stale-snapshot-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/gpt_quant/portfolio_target_risk.py tests/test_portfolio_target_risk.py .github/workflows/risk-stale-snapshot-patch.yml
          git diff --cached --check
          git commit -m "fix(risk): reject stale portfolio snapshots"
          git push origin HEAD:${{ github.head_ref }}
