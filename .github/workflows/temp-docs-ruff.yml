name: Temporary Docs Ruff Formatter

on:
  push:
    branches:
      - auto/docs/20260722-01-reproduction-guide

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[docs-ruff]') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: auto/docs/20260722-01-reproduction-guide
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install formatter
        run: python -m pip install -e ".[dev]"
      - name: Apply Ruff formatting
        run: ruff format tests/test_okx_holdout_documentation.py
      - name: Commit formatted test and remove temporary workflow
        run: |
          rm .github/workflows/temp-docs-ruff.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_okx_holdout_documentation.py .github/workflows/temp-docs-ruff.yml
          git commit -m "style(docs): apply Ruff formatting [docs-ruff]"
          git push origin HEAD:auto/docs/20260722-01-reproduction-guide
