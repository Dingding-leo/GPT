name: Risk Ruff Diagnostic

on:
  pull_request:
    paths:
      - "src/gpt_quant/portfolio_target_risk.py"
      - "tests/test_portfolio_target_risk.py"
      - ".github/workflows/risk-ruff-diagnostic.yml"

permissions:
  contents: write

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - run: python -m pip install ruff==0.15.22
      - run: ruff check src/gpt_quant/portfolio_target_risk.py tests/test_portfolio_target_risk.py
      - run: ruff format src/gpt_quant/portfolio_target_risk.py tests/test_portfolio_target_risk.py
      - name: Commit canonical formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/gpt_quant/portfolio_target_risk.py tests/test_portfolio_target_risk.py
          git diff --cached --quiet && exit 0
          git commit -m "style: apply canonical risk formatting"
          git push origin HEAD:${{ github.head_ref }}
