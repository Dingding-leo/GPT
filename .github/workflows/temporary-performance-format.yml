name: Temporary Performance Format

on:
  push:
    branches:
      - auto/performance/20260724-07-reuse-snapshot-canonical-bytes

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: auto/performance/20260724-07-reuse-snapshot-canonical-bytes
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Apply canonical Ruff output
        run: |
          python -m pip install --disable-pip-version-check 'ruff>=0.9,<1'
          ruff check . --fix
          ruff format .
          rm .github/workflows/temporary-performance-format.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: apply canonical Ruff formatting'
          git push origin HEAD:auto/performance/20260724-07-reuse-snapshot-canonical-bytes
