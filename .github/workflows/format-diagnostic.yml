name: Format Diagnostic

on:
  pull_request:
    paths:
      - "reports/research/prior-volume-capacity-gate/**"
      - "tests/test_prior_volume_capacity_gate_report.py"
      - ".github/workflows/format-diagnostic.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
          cache: pip
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Apply exact Ruff output
        run: |
          ruff check --fix \
            reports/research/prior-volume-capacity-gate/analysis.py \
            tests/test_prior_volume_capacity_gate_report.py || true
          ruff format \
            reports/research/prior-volume-capacity-gate/analysis.py \
            tests/test_prior_volume_capacity_gate_report.py
          ruff check \
            reports/research/prior-volume-capacity-gate/analysis.py \
            tests/test_prior_volume_capacity_gate_report.py \
            > ruff-check.txt 2>&1 || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: exact-ruff-output-${{ github.run_id }}
          path: |
            reports/research/prior-volume-capacity-gate/analysis.py
            tests/test_prior_volume_capacity_gate_report.py
            ruff-check.txt
          if-no-files-found: error
          retention-days: 1
