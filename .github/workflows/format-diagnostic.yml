name: Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python -m pip install "ruff>=0.9,<1"
      - name: Capture diagnostics
        run: |
          ruff check src/gpt_quant/okx_instruments.py tests/test_okx_instruments.py > ruff-check.txt 2>&1 || true
          ruff format --diff src/gpt_quant/okx_instruments.py tests/test_okx_instruments.py > ruff-format.diff 2>&1 || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ruff-diagnostics
          path: |
            ruff-check.txt
            ruff-format.diff
          if-no-files-found: error
