name: Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
          cache: pip
      - name: Install formatter
        run: python -m pip install "ruff>=0.9,<1"
      - name: Show formatter diff
        run: |
          ruff format --diff \
            reports/research/conditional-drawdown-vs-volatility-benchmark/analysis.py \
            tests/test_conditional_drawdown_vs_volatility_benchmark_report.py || true
