name: Format Diagnostic

on:
  push:
    branches:
      - auto/research/20260723-05-ulcer-index-volatility-benchmark

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"

      - name: Format submitted Python files
        run: |
          ruff format \
            reports/research/ulcer-index-vs-volatility-benchmark/analysis.py \
            tests/test_ulcer_index_vs_volatility_benchmark_report.py
          mkdir -p formatted/reports/research/ulcer-index-vs-volatility-benchmark formatted/tests
          cp reports/research/ulcer-index-vs-volatility-benchmark/analysis.py \
            formatted/reports/research/ulcer-index-vs-volatility-benchmark/analysis.py
          cp tests/test_ulcer_index_vs_volatility_benchmark_report.py formatted/tests/

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: formatted-ulcer-index-files
          path: formatted/
          if-no-files-found: error
          retention-days: 1
