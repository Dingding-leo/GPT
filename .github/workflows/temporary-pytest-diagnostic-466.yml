name: Temporary pytest diagnostic 466

on:
  push:
    branches:
      - auto/research/20260724-12-btc-1h-paper-gate

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: auto/research/20260724-12-btc-1h-paper-gate

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Capture full-suite failure
        run: |
          set -euo pipefail
          diagnostic=reports/research/canonical-btc-1h-paper-gate/pytest-failure.log
          if test -f "$diagnostic"; then
            exit 0
          fi
          python -m pip install -e ".[dev]"
          set +e
          pytest -q > /tmp/pytest.log 2>&1
          status=$?
          set -e
          if test "$status" -eq 0; then
            printf 'full pytest passed unexpectedly\n' > "$diagnostic"
          else
            tail -n 250 /tmp/pytest.log > "$diagnostic"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$diagnostic"
          git commit -m "ci: capture research pytest failure"
          git push origin HEAD:auto/research/20260724-12-btc-1h-paper-gate
