name: Temporary Data Formatter

on:
  push:
    branches:
      - auto/data/20260723-01-centralize-okx-end-coverage

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Format data targets
        run: ruff format src/gpt_quant/okx.py tests/test_okx_end_coverage.py
      - name: Upload formatted targets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: data-end-coverage-formatted-${{ github.sha }}
          path: |
            src/gpt_quant/okx.py
            tests/test_okx_end_coverage.py
          if-no-files-found: error
          retention-days: 1
