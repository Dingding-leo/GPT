name: Temporary Data Formatter

on:
  push:
    branches:
      - auto/data/20260723-01-centralize-okx-end-coverage

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[ruff-formatted]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Apply Ruff formatting
        run: ruff format src/gpt_quant/okx.py tests/test_okx_end_coverage.py
      - name: Commit formatted targets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gpt_quant/okx.py tests/test_okx_end_coverage.py
          if ! git diff --cached --quiet; then
            git commit -m "style(data): apply Ruff formatting [ruff-formatted]"
            git push origin HEAD:auto/data/20260723-01-centralize-okx-end-coverage
          fi
