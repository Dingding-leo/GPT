name: PR290 Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"

      - name: Format focused files
        run: |
          ruff format \
            reports/research/prior-fold-volatility-matched-es-vs-volatility-benchmark/analysis.py \
            tests/test_prior_fold_volatility_matched_es_vs_volatility_benchmark_report.py
          mkdir -p /tmp/pr290-formatted/reports /tmp/pr290-formatted/tests
          cp reports/research/prior-fold-volatility-matched-es-vs-volatility-benchmark/analysis.py \
            /tmp/pr290-formatted/reports/analysis.py
          cp tests/test_prior_fold_volatility_matched_es_vs_volatility_benchmark_report.py \
            /tmp/pr290-formatted/tests/test_report.py

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: pr290-formatted
          path: /tmp/pr290-formatted
          if-no-files-found: error
          retention-days: 1
