name: Temporary Performance Formatter

on:
  push:
    branches:
      - auto/performance/20260723-20-cache-grid-scaling

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install formatter
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Format and commit focused files
        run: |
          ruff format benchmarks/run_walk_forward_cache_scaling.py tests/test_walk_forward_cache_scaling_benchmark.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/run_walk_forward_cache_scaling.py tests/test_walk_forward_cache_scaling_benchmark.py
          if git diff --cached --quiet; then
            echo "No formatter changes required."
          else
            git commit -m "style(performance): apply exact formatter output"
            git push origin HEAD:auto/performance/20260723-20-cache-grid-scaling
          fi
