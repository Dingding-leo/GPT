name: Repro Ruff Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Generate canonical Ruff patch
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          ruff check --fix . || true
          ruff format .
          git diff -- src/gpt_quant/paper_execution_reconciliation.py tests/test_paper_execution_reconciliation.py > /tmp/repro-ruff.patch
          test -s /tmp/repro-ruff.patch
      - name: Upload canonical Ruff patch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repro-ruff-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: /tmp/repro-ruff.patch
          if-no-files-found: error
          retention-days: 1
