name: Repro Ruff Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Show exact diagnostics
        run: |
          set +e
          ruff check src/gpt_quant/execution_quote_evidence.py tests/test_execution_quote_evidence.py
          check_status=$?
          ruff format --diff src/gpt_quant/execution_quote_evidence.py tests/test_execution_quote_evidence.py
          format_status=$?
          exit $((check_status || format_status))
