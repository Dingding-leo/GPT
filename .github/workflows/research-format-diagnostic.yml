name: Research Format Diagnostic

on:
  push:
    branches:
      - auto/research/20260724-00-execution-delay-cost-stress

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install -e ".[dev]"
      - name: Format focused files
        run: |
          ruff format \
            reports/research/canonical-5bps-execution-delay-cost-stress/analysis.py \
            tests/test_canonical_5bps_execution_delay_cost_stress_report.py
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: research-format-diagnostic
          path: |
            reports/research/canonical-5bps-execution-delay-cost-stress/analysis.py
            tests/test_canonical_5bps_execution_delay_cost_stress_report.py
          if-no-files-found: error
          retention-days: 1
