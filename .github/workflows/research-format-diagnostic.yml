name: Apply Research Formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.0.0
        with:
          python-version: "3.14"
      - run: python -m pip install "ruff==0.15.22"
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("reports/research/persisted-live-metric-contract/analysis.py")
          content = path.read_text(encoding="utf-8")
          content = content.replace(
              '            "calendar_return": "compounded net daily return with incomplete periods labelled partial",\n',
              '            "calendar_return": (\n'
              '                "compounded net daily return with incomplete periods labelled partial"\n'
              '            ),\n',
          )
          path.write_text(content, encoding="utf-8")
          PY
          ruff format \
            reports/research/persisted-live-metric-contract/analysis.py \
            tests/test_persisted_live_metric_contract_report.py
          ruff check \
            reports/research/persisted-live-metric-contract/analysis.py \
            tests/test_persisted_live_metric_contract_report.py
          rm .github/workflows/research-format-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/persisted-live-metric-contract/analysis.py \
            tests/test_persisted_live_metric_contract_report.py \
            .github/workflows/research-format-diagnostic.yml
          git commit -m "style(research): apply exact path-metric formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
