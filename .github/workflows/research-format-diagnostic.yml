name: Research Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"

      - name: Capture focused Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check --output-format concise \
            reports/research/cross_market_maximin_shared_candidate/analysis.py \
            reports/research/cross_market_maximin_shared_candidate/generate_result.py \
            tests/test_cross_market_maximin_shared_candidate_report.py \
            > ruff-diagnostic.txt 2>&1
          ruff format --check \
            reports/research/cross_market_maximin_shared_candidate/analysis.py \
            reports/research/cross_market_maximin_shared_candidate/generate_result.py \
            tests/test_cross_market_maximin_shared_candidate_report.py \
            >> ruff-diagnostic.txt 2>&1
          cat ruff-diagnostic.txt
          exit 0

      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cross-market-maximin-ruff-diagnostic
          path: ruff-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
