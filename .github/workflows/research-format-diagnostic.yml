name: Research Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"

      - name: Lint-fix, format and commit focused files
        shell: bash
        run: |
          set -euo pipefail
          files=(
            reports/research/cross_market_maximin_shared_candidate/analysis.py
            reports/research/cross_market_maximin_shared_candidate/generate_result.py
            tests/test_cross_market_maximin_shared_candidate_report.py
          )
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
          if git diff --quiet --exit-code; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "${files[@]}"
          git commit -m "style(research): apply exact Ruff lint fixes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
