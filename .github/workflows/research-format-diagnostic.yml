name: Research Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Capture exact Ruff formatting
        run: |
          python -m pip install --quiet "ruff==0.15.22"
          ruff format \
            reports/research/prior-fold-volatility-matched-es-vs-volatility-benchmark/analysis.py \
            tests/test_prior_fold_volatility_matched_es_vs_volatility_benchmark_report.py
          git diff -- \
            reports/research/prior-fold-volatility-matched-es-vs-volatility-benchmark/analysis.py \
            tests/test_prior_fold_volatility_matched_es_vs_volatility_benchmark_report.py \
            > ruff-format.patch
          test -s ruff-format.patch
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: prior-fold-es-ruff-format
          path: ruff-format.patch
          if-no-files-found: error
          retention-days: 1
