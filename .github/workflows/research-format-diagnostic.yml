name: Research Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Show exact Ruff formatting
        run: |
          python -m pip install "ruff==0.15.22"
          ruff format \
            reports/research/prior-fold-volatility-matched-es-vs-volatility-benchmark/analysis.py \
            tests/test_prior_fold_volatility_matched_es_vs_volatility_benchmark_report.py
          git diff -- \
            reports/research/prior-fold-volatility-matched-es-vs-volatility-benchmark/analysis.py \
            tests/test_prior_fold_volatility_matched_es_vs_volatility_benchmark_report.py
          git diff --exit-code -- \
            reports/research/prior-fold-volatility-matched-es-vs-volatility-benchmark/analysis.py \
            tests/test_prior_fold_volatility_matched_es_vs_volatility_benchmark_report.py
