name: Temporary Checkpoint Format

on:
  push:
    branches:
      - auto/reproducibility/20260724-08-quote-binding-journal
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"

      - name: Apply canonical Ruff fixes
        run: |
          ruff check --fix \
            src/gpt_quant/paper_execution_attempt_checkpoint.py \
            tests/test_paper_execution_attempt_checkpoint.py
          ruff format \
            src/gpt_quant/paper_execution_attempt_checkpoint.py \
            tests/test_paper_execution_attempt_checkpoint.py
          ruff check \
            src/gpt_quant/paper_execution_attempt_checkpoint.py \
            tests/test_paper_execution_attempt_checkpoint.py
          ruff format --check \
            src/gpt_quant/paper_execution_attempt_checkpoint.py \
            tests/test_paper_execution_attempt_checkpoint.py

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: checkpoint-formatted-${{ github.run_number }}
          path: |
            src/gpt_quant/paper_execution_attempt_checkpoint.py
            tests/test_paper_execution_attempt_checkpoint.py
          if-no-files-found: error
          retention-days: 1
