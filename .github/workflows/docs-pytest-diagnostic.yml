name: Docs Pytest Diagnostic

on:
  push:
    branches:
      - auto/docs/20260722-01-reproduction-guide

permissions:
  contents: read

jobs:
  pytest-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Capture first pytest failure
        shell: bash
        run: |
          set -o pipefail
          pytest -x -vv 2>&1 | tee pytest-diagnostic.log

      - name: Upload pytest diagnostic
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-pytest-diagnostic-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: pytest-diagnostic.log
          if-no-files-found: error
          retention-days: 1
