name: Review Ruff Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    if: github.event.pull_request.head.ref == 'auto/architecture/20260724-06-quote-intent-binding'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"

      - name: Generate canonical Ruff patch
        run: |
          set -euo pipefail
          ruff check --fix src/gpt_quant/execution_quote_binding.py tests/test_execution_quote_binding.py
          ruff format src/gpt_quant/execution_quote_binding.py tests/test_execution_quote_binding.py
          git diff -- \
            src/gpt_quant/execution_quote_binding.py \
            tests/test_execution_quote_binding.py > review-ruff.patch
          mkdir review-ruff-output
          cp review-ruff.patch review-ruff-output/
          cp src/gpt_quant/execution_quote_binding.py review-ruff-output/
          cp tests/test_execution_quote_binding.py review-ruff-output/test_execution_quote_binding.py
          test -s review-ruff.patch

      - name: Upload canonical Ruff output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: review-ruff-output-${{ github.run_number }}-${{ github.run_attempt }}
          path: review-ruff-output
          if-no-files-found: error
          retention-days: 1
