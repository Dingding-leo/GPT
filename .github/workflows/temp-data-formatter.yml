name: Temporary Data Formatter

on:
  push:
    branches:
      - auto/data/20260722-12-reject-conflicting-okx-duplicates

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Format target files
        run: ruff format scripts/run_okx_research.py tests/test_run_okx_research_data_schema.py
      - name: Upload formatted files
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: data-formatted-${{ github.sha }}
          path: |
            scripts/run_okx_research.py
            tests/test_run_okx_research_data_schema.py
          if-no-files-found: error
          retention-days: 1
