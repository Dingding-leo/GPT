name: Temporary Research Formatter

on:
  push:
    branches:
      - auto/research/20260722-21-cscv-pbo-candidate-grid

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[ruff-finalized]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Apply formatting and remove diagnostics
        run: |
          ruff format reports/research/cscv-pbo-candidate-grid/analysis.py tests/test_cscv_pbo_candidate_grid.py
          git checkout origin/main -- .github/workflows/hourly-research.yml
          git rm .github/workflows/temporary-research-formatter.yml
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/research/cscv-pbo-candidate-grid/analysis.py tests/test_cscv_pbo_candidate_grid.py .github/workflows/hourly-research.yml
          git commit -m "style(research): apply Ruff formatting [ruff-finalized]"
          git push origin HEAD:auto/research/20260722-21-cscv-pbo-candidate-grid
