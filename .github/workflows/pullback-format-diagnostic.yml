name: Pullback Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"

      - name: Apply exact Ruff format
        run: |
          ruff format \
            reports/research/regime-pullback-recovery-1h \
            tests/test_regime_pullback_recovery_1h_report.py
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/regime-pullback-recovery-1h \
            tests/test_regime_pullback_recovery_1h_report.py
          git diff --cached --quiet && exit 0
          git commit -m "style(research): format pullback recovery evidence"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
