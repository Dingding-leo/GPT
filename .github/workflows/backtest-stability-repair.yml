name: Temporary Backtest Stability Repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  repair:
    if: ${{ github.head_ref == 'auto/backtest/20260722-22-exact-stability-keys' && !contains(github.event.pull_request.title, '[stability-repaired]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Apply focused correction and regression
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          source_path = Path("src/gpt_quant/walk_forward.py")
          source = source_path.read_text(encoding="utf-8")
          helper = dedent(
              '''

              def _parameter_stability_key(parameters: Mapping[str, Any]) -> str:
                  trend_weight = float(parameters["trend_weight"])
                  displayed_weight = f"{trend_weight:.4f}"
                  if float(displayed_weight) != trend_weight:
                      displayed_weight = repr(trend_weight)
                  return (
                      f"m={parameters['momentum_lookback']}|r={parameters['reversal_lookback']}|"
                      f"trend={displayed_weight}"
                  )


              def _parameter_stability(selected: Iterable[Mapping[str, Any]]) -> dict[str, Any]:
                  parameter_keys = [_parameter_stability_key(item) for item in selected]
                  switches = sum(
                      left != right
                      for left, right in zip(parameter_keys, parameter_keys[1:], strict=False)
                  )
                  return {
                      "selection_frequency": dict(Counter(parameter_keys).most_common()),
                      "parameter_switches": switches,
                      "parameter_switch_rate": switches / max(1, len(parameter_keys) - 1),
                      "unique_parameter_sets": len(set(parameter_keys)),
                  }
              '''
          )
          if "def _parameter_stability_key" in source:
              raise SystemExit("parameter stability helper already exists")
          candidate_start = source.index("def _candidates(")
          insertion_at = source.index("\n\ndef _run_test_window(", candidate_start)
          source = source[:insertion_at] + helper + source[insertion_at:]

          stability_start = source.index(
              "    parameter_keys = [", source.index("def run_walk_forward_research(")
          )
          stability_end = source.index("    fold_stability =", stability_start)
          source = (
              source[:stability_start]
              + "    stability = _parameter_stability(selected)\n"
              + source[stability_end:]
          )
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/test_walk_forward_weight_identity.py")
          tests = test_path.read_text(encoding="utf-8")
          if "test_parameter_stability_preserves_exact_high_precision_weight_identity" in tests:
              raise SystemExit("regression already exists")
          addition = dedent(
              '''


              def test_parameter_stability_preserves_exact_high_precision_weight_identity() -> None:
                  selected = [
                      {"momentum_lookback": 21, "reversal_lookback": 3, "trend_weight": 0.7},
                      {
                          "momentum_lookback": 21,
                          "reversal_lookback": 3,
                          "trend_weight": 0.70000000001,
                      },
                      {"momentum_lookback": 21, "reversal_lookback": 3, "trend_weight": 0.7},
                  ]

                  stability = walk_forward._parameter_stability(selected)

                  assert stability["selection_frequency"] == {
                      "m=21|r=3|trend=0.7000": 2,
                      "m=21|r=3|trend=0.70000000001": 1,
                  }
                  assert stability["parameter_switches"] == 2
                  assert stability["parameter_switch_rate"] == 1.0
                  assert stability["unique_parameter_sets"] == 2
              '''
          )
          test_path.write_text(tests.rstrip() + addition, encoding="utf-8")
          PY
      - name: Verify focused change
        run: |
          ruff format src/gpt_quant/walk_forward.py tests/test_walk_forward_weight_identity.py
          ruff check src/gpt_quant/walk_forward.py tests/test_walk_forward_weight_identity.py
          ruff format --check src/gpt_quant/walk_forward.py tests/test_walk_forward_weight_identity.py
          pytest -q tests/test_walk_forward_weight_identity.py
      - name: Commit focused final tree
        run: |
          rm .github/workflows/backtest-stability-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gpt_quant/walk_forward.py tests/test_walk_forward_weight_identity.py .github/workflows/backtest-stability-repair.yml
          git commit -m "fix(backtest): preserve parameter stability identity [stability-repaired]"
          git push origin HEAD:auto/backtest/20260722-22-exact-stability-keys
