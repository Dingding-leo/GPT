name: Architecture Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install formatter
        run: python -m pip install -e ".[dev]"

      - name: Produce canonical files
        run: |
          set -euo pipefail
          files=(
            src/gpt_quant/paper_order_decision.py
            src/gpt_quant/_paper_decision_store_core.py
            src/gpt_quant/paper_decision_store.py
            tests/test_paper_order_decision_boundary.py
            tests/test_paper_decision_store.py
            tests/test_paper_decision_directory_fsync.py
            tests/test_paper_decision_directory_security.py
            tests/test_paper_decision_missing_store_security.py
          )
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
          git diff --check
          git diff -- "${files[@]}"
          tar -czf /tmp/architecture-formatted-files.tar.gz "${files[@]}"

      - name: Upload canonical files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: architecture-formatted-files-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: /tmp/architecture-formatted-files.tar.gz
          if-no-files-found: error
          retention-days: 1
