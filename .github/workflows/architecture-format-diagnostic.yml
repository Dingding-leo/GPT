name: Architecture Format Diagnostic

on:
  push:
    branches:
      - auto/architecture/20260724-02-intent-journal

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: python -m pip install "ruff>=0.9,<1"

      - name: Capture lint and format diagnostics
        shell: bash
        run: |
          set +e
          ruff check src/gpt_quant/target_intent_journal.py tests/test_target_intent_journal.py > ruff-check.txt 2>&1
          ruff format --diff src/gpt_quant/target_intent_journal.py tests/test_target_intent_journal.py > ruff-format.diff 2>&1
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: architecture-intent-journal-format
          path: |
            ruff-check.txt
            ruff-format.diff
          if-no-files-found: error
          retention-days: 1
