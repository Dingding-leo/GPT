name: Temporary PR98 Formatter

on:
  push:
    branches:
      - auto/research/20260722-12-portfolio-expected-shortfall

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[ruff-formatted]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Apply Ruff formatting and line-length fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path(
              "reports/research/portfolio-expected-shortfall-diversification/analysis.py"
          )
          content = path.read_text(encoding="utf-8")
          content = content.replace(
              '        "| Sleeve comparison | Sleeve ES | Portfolio minus sleeve ES | 95% interval | P(reduction > 0) |",\n',
              '        (\n'
              '            "| Sleeve comparison | Sleeve ES | Portfolio minus sleeve ES | "\n'
              '            "95% interval | P(reduction > 0) |"\n'
              '        ),\n',
          )
          path.write_text(content, encoding="utf-8")
          PY
          ruff format \
            reports/research/portfolio-expected-shortfall-diversification/analysis.py \
            tests/test_portfolio_expected_shortfall_diversification_report.py
          ruff check \
            reports/research/portfolio-expected-shortfall-diversification/analysis.py \
            tests/test_portfolio_expected_shortfall_diversification_report.py
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/portfolio-expected-shortfall-diversification/analysis.py \
            tests/test_portfolio_expected_shortfall_diversification_report.py
          if ! git diff --cached --quiet; then
            git commit -m "style(research): apply Ruff formatting [ruff-formatted]"
            git push origin HEAD:auto/research/20260722-12-portfolio-expected-shortfall
          fi
