name: Format Top3 Binding

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Format score binding
        run: |
          python -m pip install "ruff==0.15.22"
          ruff check --fix tests/test_fold_local_top3_score_binding.py
          ruff format tests/test_fold_local_top3_score_binding.py
      - name: Upload formatted score binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatted-top3-binding
          path: tests/test_fold_local_top3_score_binding.py
          if-no-files-found: error
          retention-days: 1
