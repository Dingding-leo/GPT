name: Ruff Format Diagnostic

on:
  push:
    branches:
      - auto/live/20260724-01-path-diagnostics
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Apply repository lint fixes and formatting
        run: |
          files=(
            src/gpt_quant/walk_forward_diagnostics.py
            src/gpt_quant/walk_forward_report.py
            tests/test_walk_forward_path_diagnostics.py
          )
          ruff check --fix --exit-zero "${files[@]}"
          ruff format "${files[@]}"
          ruff check "${files[@]}"
          ruff format --check "${files[@]}"

      - name: Upload formatted files
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-formatted-${{ github.run_id }}
          path: |
            src/gpt_quant/walk_forward_diagnostics.py
            src/gpt_quant/walk_forward_report.py
            tests/test_walk_forward_path_diagnostics.py
          if-no-files-found: error
          retention-days: 1
