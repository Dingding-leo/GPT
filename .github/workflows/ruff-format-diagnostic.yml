name: Ruff Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Capture canonical Ruff formatting
        shell: bash
        run: |
          set -o pipefail
          python -m pip install "ruff>=0.9,<1"
          ruff format --check . 2>&1 | tee ruff-format.txt || true
          test -s ruff-format.txt

      - name: Upload formatting output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-format-diagnostic-${{ github.run_number }}
          path: ruff-format.txt
          if-no-files-found: error
          retention-days: 1
