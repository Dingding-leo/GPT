name: Temporary Ruff Format Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Capture repository Ruff diagnostics
        run: |
          ruff check --output-format=json . > ruff-check.json || true
          ruff format --check --diff . > ruff-format.diff || true
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-formatted-okx-1h
          path: |
            ruff-check.json
            ruff-format.diff
          if-no-files-found: error
          retention-days: 1
