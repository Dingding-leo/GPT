name: Temporary Ruff Format Diagnostic

on:
  push:
    branches:
      - auto/data/20260724-12-okx-1h-coverage

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Format focused files
        run: ruff format src/gpt_quant/okx_1h.py tests/test_okx_1h_coverage.py
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-formatted-okx-1h
          path: |
            src/gpt_quant/okx_1h.py
            tests/test_okx_1h_coverage.py
          if-no-files-found: error
          retention-days: 1
