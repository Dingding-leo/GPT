name: Pytest Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install project
        run: |
          python -m pip install -e ".[dev]"
          python -m pip check
      - name: Capture pytest diagnostics
        run: pytest -q > pytest-output.txt 2>&1 || true
      - name: Upload pytest diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: pytest-diagnostic-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 1
