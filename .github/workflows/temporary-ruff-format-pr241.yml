name: Temporary Ruff Format PR 241

on:
  push:
    branches:
      - auto/research/20260723-16-volatility-matched-acute-loss

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: auto/research/20260723-16-volatility-matched-acute-loss
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Format, remove diagnostic, and push
        run: |
          ruff format \
            reports/research/volatility-matched-fold-worst-20-session-loss-vs-volatility-benchmark/analysis.py \
            tests/test_volatility_matched_fold_worst_20_session_loss_vs_volatility_benchmark.py
          git rm .github/workflows/temporary-ruff-format-pr241.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/volatility-matched-fold-worst-20-session-loss-vs-volatility-benchmark/analysis.py \
            tests/test_volatility_matched_fold_worst_20_session_loss_vs_volatility_benchmark.py
          git commit -m "style(research): apply Ruff formatting"
          git push origin HEAD:auto/research/20260723-16-volatility-matched-acute-loss
