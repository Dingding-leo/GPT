name: Temporary Ruff Format PR 241

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Format focused files
        run: |
          ruff format \
            reports/research/volatility-matched-fold-worst-20-session-loss-vs-volatility-benchmark/analysis.py \
            tests/test_volatility_matched_fold_worst_20_session_loss_vs_volatility_benchmark.py
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr241-ruff-formatted
          path: |
            reports/research/volatility-matched-fold-worst-20-session-loss-vs-volatility-benchmark/analysis.py
            tests/test_volatility_matched_fold_worst_20_session_loss_vs_volatility_benchmark.py
          if-no-files-found: error
          retention-days: 1
