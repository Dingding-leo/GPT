name: Format Return Skewness

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install formatter
        run: python -m pip install "ruff>=0.9,<1"
      - name: Format focused files
        run: |
          ruff format \
            reports/research/return-skewness-vs-volatility-benchmark/analysis.py \
            tests/test_return_skewness_vs_volatility_benchmark_report.py \
            > ruff-format.log 2>&1 || true
          cat ruff-format.log
          mkdir formatted-output
          cp reports/research/return-skewness-vs-volatility-benchmark/analysis.py \
            formatted-output/analysis.py
          cp tests/test_return_skewness_vs_volatility_benchmark_report.py \
            formatted-output/test_report.py
          cp ruff-format.log formatted-output/ruff-format.log
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatted-return-skewness
          path: formatted-output
          if-no-files-found: error
