name: Fix Channel Breakout Result

on:
  push:
    branches:
      - auto/research/20260724-15-breakout-trend

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Repair and validate JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("reports/research/channel-breakout-trend-1h/result.json")
          text = path.read_text(encoding="utf-8").rstrip()
          try:
              json.loads(text)
          except json.JSONDecodeError:
              text += "}"
          json.loads(text)
          path.write_text(text + "\n", encoding="utf-8")
          PY
      - name: Commit repair
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/research/channel-breakout-trend-1h/result.json
          git commit -m "fix(research): close channel breakout result JSON"
          git push
