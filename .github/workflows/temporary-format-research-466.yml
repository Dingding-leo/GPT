name: Temporary format research 466

on:
  push:
    branches:
      - auto/research/20260724-12-btc-1h-paper-gate

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: auto/research/20260724-12-btc-1h-paper-gate

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install and apply repository formatter
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          ruff format \
            reports/research/canonical-btc-1h-paper-gate/analysis.py \
            tests/test_canonical_btc_1h_paper_gate_report.py
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/canonical-btc-1h-paper-gate/analysis.py \
            tests/test_canonical_btc_1h_paper_gate_report.py
          git commit -m "style(research): format BTC 1h paper-gate audit"
          git push origin HEAD:auto/research/20260724-12-btc-1h-paper-gate
