name: Temporary High-Turnover Formatter

on:
  push:
    branches:
      - auto/research/20260722-15-high-turnover-slippage
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Format target files
        run: |
          ruff format reports/research/high-turnover-slippage-stress/analysis.py
          ruff format tests/test_high_turnover-slippage-stress_report.py
      - name: Upload formatted files
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: high-turnover-formatted-${{ github.sha }}
          path: |
            reports/research/high-turnover-slippage-stress/analysis.py
            tests/test_high-turnover-slippage-stress_report.py
          if-no-files-found: error
          retention-days: 1
