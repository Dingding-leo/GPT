name: Architecture Ruff Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - "src/gpt_quant/paper_submission_identity.py"
      - "tests/test_paper_submission_identity.py"
      - ".github/workflows/architecture-ruff-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Capture exact Ruff output
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          set +e
          ruff check src/gpt_quant/paper_submission_identity.py tests/test_paper_submission_identity.py > ruff.txt 2>&1
          check_status=$?
          ruff format --check src/gpt_quant/paper_submission_identity.py tests/test_paper_submission_identity.py >> ruff.txt 2>&1
          format_status=$?
          set -e
          printf '\ncheck_status=%s\nformat_status=%s\n' "$check_status" "$format_status" >> ruff.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: architecture-ruff-diagnostic
          path: ruff.txt
          if-no-files-found: error
          retention-days: 1
