name: Backtest Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          ruff check . --output-format concise > diagnostics/lint.txt 2>&1 || true
          ruff format --diff . > diagnostics/format.diff 2>&1 || true
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backtest-format-diagnostics
          path: diagnostics/
          if-no-files-found: error
          retention-days: 1
