name: Backtest Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out source branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Format, remove diagnostic, and publish
        run: |
          set -euo pipefail
          python -m pip install "ruff>=0.9,<1"
          ruff check src/gpt_quant/maker_fill_replay.py tests/test_maker_fill_replay.py
          ruff format src/gpt_quant/maker_fill_replay.py tests/test_maker_fill_replay.py
          ruff check src/gpt_quant/maker_fill_replay.py tests/test_maker_fill_replay.py
          ruff format --check src/gpt_quant/maker_fill_replay.py tests/test_maker_fill_replay.py
          git rm .github/workflows/backtest-format-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gpt_quant/maker_fill_replay.py tests/test_maker_fill_replay.py
          git commit -m "style(backtest): apply canonical Ruff formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
