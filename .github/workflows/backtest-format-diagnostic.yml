name: Backtest Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'auto/backtest/20260724-08-paper-execution-attempt'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Format and remove diagnostic workflow
        run: |
          python -m pip install "ruff>=0.9,<1"
          ruff format \
            src/gpt_quant/paper_execution_attempt.py \
            tests/test_paper_execution_attempt.py
          ruff check \
            src/gpt_quant/paper_execution_attempt.py \
            tests/test_paper_execution_attempt.py
          git rm .github/workflows/backtest-format-diagnostic.yml
          git add \
            src/gpt_quant/paper_execution_attempt.py \
            tests/test_paper_execution_attempt.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "style(backtest): apply canonical Ruff formatting"
          git push origin "HEAD:${{ github.head_ref }}"
