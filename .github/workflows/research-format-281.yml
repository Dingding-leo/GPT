name: Research Format 281

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Format focused Python files
        run: |
          ruff format \
            reports/research/volatility-matched-expected-shortfall-vs-volatility-benchmark/analysis.py \
            tests/test_volatility_matched_expected_shortfall_vs_volatility_benchmark_report.py

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: formatted-research-281
          path: |
            reports/research/volatility-matched-expected-shortfall-vs-volatility-benchmark/analysis.py
            tests/test_volatility_matched_expected_shortfall_vs_volatility_benchmark_report.py
          if-no-files-found: error
          retention-days: 1
