name: Risk freshness lint fix

on:
  pull_request:
    paths:
      - "src/gpt_quant/portfolio_freshness_risk.py"
      - "tests/test_portfolio_freshness_risk.py"
      - ".github/workflows/risk-freshness-lint-fix.yml"

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install focused tools
        run: python -m pip install ruff==0.15.22 pytest==8.4.2
      - name: Apply canonical lint fixes and formatting
        run: |
          set -euo pipefail
          python -m ruff check --fix \
            src/gpt_quant/portfolio_freshness_risk.py \
            tests/test_portfolio_freshness_risk.py
          python -m ruff format \
            src/gpt_quant/portfolio_freshness_risk.py \
            tests/test_portfolio_freshness_risk.py
      - name: Commit canonical files and remove fixer
        run: |
          set -euo pipefail
          rm .github/workflows/risk-freshness-lint-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/gpt_quant/portfolio_freshness_risk.py \
            tests/test_portfolio_freshness_risk.py \
            .github/workflows/risk-freshness-lint-fix.yml
          git diff --cached --check
          git commit -m "style(risk): apply freshness lint fixes"
          git push origin HEAD:${{ github.head_ref }}
      - name: Verify focused risk gate
        run: |
          set -euo pipefail
          python -m ruff check \
            src/gpt_quant/portfolio_freshness_risk.py \
            tests/test_portfolio_freshness_risk.py
          python -m ruff format --check \
            src/gpt_quant/portfolio_freshness_risk.py \
            tests/test_portfolio_freshness_risk.py
          PYTHONPATH=src python -m pytest -q \
            tests/test_portfolio_target_risk.py \
            tests/test_portfolio_freshness_risk.py
