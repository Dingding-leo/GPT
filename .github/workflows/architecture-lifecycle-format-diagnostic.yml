name: Architecture Lifecycle Format Diagnostic

on:
  push:
    branches:
      - auto/architecture/20260724-13-retry-stable-maker-intent

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python -m pip install "ruff>=0.9,<1"
      - name: Show exact Ruff diagnostics
        run: |
          ruff check src/gpt_quant/paper_order_transition.py tests/test_paper_order_transition.py || true
          ruff format --diff src/gpt_quant/paper_order_transition.py tests/test_paper_order_transition.py || true
