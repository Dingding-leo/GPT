name: Dual Horizon Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'auto/research/20260724-14-dual-horizon-hysteresis'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"

      - name: Apply exact Ruff formatting
        run: |
          ruff format \
            reports/research/dual-horizon-hysteresis-1h \
            tests/test_dual_horizon_hysteresis_1h_report.py
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/dual-horizon-hysteresis-1h \
            tests/test_dual_horizon_hysteresis_1h_report.py
          git commit -m "style(research): apply exact Ruff formatting"
          git push origin HEAD:${{ github.head_ref }}
