name: Auto Docs Format

on:
  push:
    branches:
      - auto/docs/20260722-01-reproduction-guide

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
          cache: pip
      - name: Install formatter
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Format documentation regression
        run: ruff format tests/test_walk_forward_report_documentation.py
      - name: Upload formatted regression
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: auto-docs-formatted-regression
          path: tests/test_walk_forward_report_documentation.py
          if-no-files-found: error
          retention-days: 1
