name: Temporary Risk Formatter

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install formatter
        run: python -m pip install "ruff==0.15.22"
      - name: Format focused files
        run: |
          ruff format \
            scripts/run_portfolio_risk.py \
            tests/test_portfolio_cli_risk_gate.py \
            tests/test_portfolio_workflow_budget.py
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-formatted-files-${{ github.run_number }}
          path: |
            scripts/run_portfolio_risk.py
            tests/test_portfolio_cli_risk_gate.py
            tests/test_portfolio_workflow_budget.py
          if-no-files-found: error
          retention-days: 1
