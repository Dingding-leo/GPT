name: Runtime Format Diagnostic

on:
  pull_request:
  push:
    branches:
      - auto/reproducibility/20260724-08-quote-binding-journal

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install formatter
        run: python -m pip install "ruff>=0.9,<1"
      - name: Format bounded files
        run: |
          ruff check --fix \
            src/gpt_quant/execution_quote_binding_journal.py \
            tests/test_execution_quote_binding_journal_parse_performance.py \
            benchmarks/run_execution_quote_binding_replay.py
          ruff format \
            src/gpt_quant/execution_quote_binding_journal.py \
            tests/test_execution_quote_binding_journal_parse_performance.py \
            benchmarks/run_execution_quote_binding_replay.py
          mkdir -p runtime-format/src/gpt_quant runtime-format/tests runtime-format/benchmarks
          cp src/gpt_quant/execution_quote_binding_journal.py runtime-format/src/gpt_quant/
          cp tests/test_execution_quote_binding_journal_parse_performance.py runtime-format/tests/
          cp benchmarks/run_execution_quote_binding_replay.py runtime-format/benchmarks/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-format-${{ github.run_id }}
          path: runtime-format
          if-no-files-found: error
