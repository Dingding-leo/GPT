name: Docs Test Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python -m pip install "pip==26.1.2" && python -m pip install -e ".[dev]"
      - name: Run focused documentation tests
        shell: bash
        run: |
          set +e
          python -m pytest -q tests/test_dependency_audit_documentation.py tests/test_walk_forward_warmup_documentation.py > docs-test-output.txt 2>&1
          status=$?
          cat docs-test-output.txt
          echo "$status" > docs-test-status.txt
          exit 0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docs-test-diagnostic
          path: |
            docs-test-output.txt
            docs-test-status.txt
          if-no-files-found: error
          retention-days: 1
