name: Docs Test Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Capture focused test output
        run: |
          python -m pip install -e ".[dev]"
          set +e
          pytest -vv --tb=long tests/test_signal_intent_timing_documentation.py > docs-test-output.txt 2>&1
          printf 'status=%s\n' "$?" >> docs-test-output.txt
          exit 0
      - name: Upload focused test output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-test-output
          path: docs-test-output.txt
          if-no-files-found: error
          retention-days: 1
