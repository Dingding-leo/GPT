name: Ruff Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          ruff --version > ruff-diagnostic.txt
          ruff check . >> ruff-diagnostic.txt 2>&1 || true
          ruff format --check . >> ruff-diagnostic.txt 2>&1 || true
          cat ruff-diagnostic.txt

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: ruff-diagnostic
          path: ruff-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
