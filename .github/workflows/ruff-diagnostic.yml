name: Ruff Diagnostic

on:
  pull_request:
    paths:
      - "tests/test_live_fee_baseline.py"
      - ".github/workflows/ruff-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install -e ".[dev]"

      - name: Capture exact Ruff changes
        run: |
          ruff check . --fix || true
          ruff format .
          git diff -- tests/test_live_fee_baseline.py > ruff-diagnostic.diff
          git diff --check

      - name: Upload Ruff diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-diagnostic-${{ github.run_number }}
          path: ruff-diagnostic.diff
          if-no-files-found: error
          retention-days: 1
