name: Temporary Ruff Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check . --output-format concise > ruff-check.txt 2>&1
          check_status=$?
          ruff format --diff . > ruff-format.diff 2>&1
          format_status=$?
          printf 'check_status=%s\nformat_status=%s\n' "$check_status" "$format_status" > ruff-status.txt
          exit 0
      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruff-diagnostic-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            ruff-check.txt
            ruff-format.diff
            ruff-status.txt
          if-no-files-found: error
          retention-days: 1
