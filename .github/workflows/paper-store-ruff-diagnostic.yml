name: Paper Store Ruff Diagnostic

on:
  push:
    branches:
      - auto/live/20260724-11-paper-store-genesis-format

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Run exact Ruff gates
        run: |
          python -m pip install 'ruff>=0.9,<1'
          ruff --version
          ruff check \
            src/gpt_quant/_paper_decision_store_core.py \
            src/gpt_quant/paper_decision_store.py \
            tests/test_paper_decision_store.py \
            tests/test_paper_decision_directory_fsync.py \
            tests/test_paper_decision_directory_security.py \
            tests/test_paper_decision_missing_store_security.py
          ruff format --check \
            src/gpt_quant/_paper_decision_store_core.py \
            src/gpt_quant/paper_decision_store.py \
            tests/test_paper_decision_store.py \
            tests/test_paper_decision_directory_fsync.py \
            tests/test_paper_decision_directory_security.py \
            tests/test_paper_decision_missing_store_security.py
