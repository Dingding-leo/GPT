name: Risk Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Produce canonical Ruff output
        run: |
          ruff check --fix \
            src/gpt_quant/portfolio_path_risk_budget.py \
            scripts/run_portfolio_underlying_risk.py \
            tests/test_portfolio_path_risk_budget.py
          ruff format \
            src/gpt_quant/portfolio_path_risk_budget.py \
            scripts/run_portfolio_underlying_risk.py \
            tests/test_portfolio_path_risk_budget.py
          ruff check \
            src/gpt_quant/portfolio_path_risk_budget.py \
            scripts/run_portfolio_underlying_risk.py \
            tests/test_portfolio_path_risk_budget.py
          ruff format --check \
            src/gpt_quant/portfolio_path_risk_budget.py \
            scripts/run_portfolio_underlying_risk.py \
            tests/test_portfolio_path_risk_budget.py

      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-format-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            src/gpt_quant/portfolio_path_risk_budget.py
            scripts/run_portfolio_underlying_risk.py
            tests/test_portfolio_path_risk_budget.py
          if-no-files-found: error
          retention-days: 1
