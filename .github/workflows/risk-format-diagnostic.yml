name: Risk Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Format diagnostic files
        run: |
          python -m pip install "ruff==0.15.22"
          mkdir -p diagnostic
          ruff check . > diagnostic/check-before.txt 2>&1 || true
          ruff format --check . > diagnostic/format-before.txt 2>&1 || true
          ruff check --fix \
            src/gpt_quant/portfolio_underlying_risk.py \
            scripts/run_portfolio_underlying_risk.py \
            tests/test_portfolio_underlying_risk.py || true
          ruff format \
            src/gpt_quant/portfolio_underlying_risk.py \
            scripts/run_portfolio_underlying_risk.py \
            tests/test_portfolio_underlying_risk.py
          cp --parents \
            src/gpt_quant/portfolio_underlying_risk.py \
            scripts/run_portfolio_underlying_risk.py \
            tests/test_portfolio_underlying_risk.py \
            diagnostic/
          ruff check . > diagnostic/check-after.txt 2>&1 || true
          ruff format --check . > diagnostic/format-after.txt 2>&1 || true

      - name: Upload diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-format-diagnostic
          path: diagnostic/
          if-no-files-found: error
          retention-days: 1
