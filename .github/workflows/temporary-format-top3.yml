name: Temporary Top-3 Formatter

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - name: Install exact Ruff
        run: python -m pip install "ruff==0.15.22"
      - name: Apply exact lint fixes and formatting
        run: |
          ruff check --fix \
            reports/research/fold_local_top3_score_ensemble \
            tests/test_fold_local_top3_score_ensemble_report.py
          ruff format \
            reports/research/fold_local_top3_score_ensemble \
            tests/test_fold_local_top3_score_ensemble_report.py
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatted-top3
          path: |
            reports/research/fold_local_top3_score_ensemble
            tests/test_fold_local_top3_score_ensemble_report.py
          if-no-files-found: error
