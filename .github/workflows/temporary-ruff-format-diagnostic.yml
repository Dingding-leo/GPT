name: Temporary Ruff Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Emit compressed Ruff formatting diff
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" \
            "https://github.com/${GITHUB_REPOSITORY}.git" repository
          python -m pip install --quiet "ruff==0.15.22"
          cd repository
          ruff format \
            reports/research/fold-drawdown-breadth/analysis.py \
            tests/test_fold_drawdown_breadth_report.py >/dev/null
          printf 'RUFF_DIFF_GZIP_BASE64='
          git diff -- \
            reports/research/fold-drawdown-breadth/analysis.py \
            tests/test_fold_drawdown_breadth_report.py \
            | gzip -c | base64 -w0
          printf '\n'
