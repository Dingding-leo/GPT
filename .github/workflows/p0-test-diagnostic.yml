name: P0 Test Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture first failing test
        run: |
          set +e
          pytest -q --maxfail=1 > p0-pytest-diagnostic.txt 2>&1
          status=$?
          printf '\npytest_exit_status=%s\n' "$status" >> p0-pytest-diagnostic.txt
          exit 0

      - name: Upload diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: p0-pytest-diagnostic
          path: p0-pytest-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
