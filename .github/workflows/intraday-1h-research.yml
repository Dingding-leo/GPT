name: Canonical BTC 1h Research

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: canonical-btc-1h-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PIP_BOOTSTRAP_VERSION: "26.1.2"
      ARTIFACT_NAME: "canonical-btc-1h-${{ github.run_number }}-attempt-${{ github.run_attempt }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          set -euo pipefail
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Verify canonical 1h profile contract
        run: pytest -q tests/test_intraday_research_profile.py

      - name: Run canonical BTC-USDT 1h full walk-forward research
        env:
          OKX_BASE_URL: https://www.okx.com
        run: |
          python scripts/run_okx_research.py \
            --config config/okx_research_1h.json \
            --inst-id BTC-USDT \
            --output-dir reports/okx/1h/BTC-USDT \
            --manifest-path reports/okx/1h/experiment-manifest.jsonl

      - name: Verify persisted canonical BTC-USDT 1h evidence
        run: |
          python scripts/verify_walk_forward_report.py \
            --output-dir reports/okx/1h/BTC-USDT \
            --manifest-path reports/okx/1h/experiment-manifest.jsonl

      - name: Upload immutable canonical BTC-USDT 1h evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: reports/okx/1h/
          if-no-files-found: error
          retention-days: 14
