name: Temporary PR 89 formatter

on:
  push:
    branches:
      - auto/research/20260722-10-best-day-dependence

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install development tools
        run: python -m pip install -e ".[dev]"

      - name: Apply repository lint fixes and formatting
        run: |
          ruff check --fix \
            reports/research/best-day-dependence/analysis.py \
            tests/test_best_day_dependence_report.py
          ruff format \
            reports/research/best-day-dependence/analysis.py \
            tests/test_best_day_dependence_report.py

      - name: Commit exact formatter output
        run: |
          if git diff --quiet -- \
            reports/research/best-day-dependence/analysis.py \
            tests/test_best_day_dependence_report.py; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/best-day-dependence/analysis.py \
            tests/test_best_day_dependence_report.py
          git commit -m "style(research): apply repository formatter"
          git push origin HEAD:auto/research/20260722-10-best-day-dependence
