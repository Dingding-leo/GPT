name: Temporary performance formatter

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
          cache: pip
      - name: Show canonical formatting
        run: |
          python -m pip install "ruff>=0.9,<1"
          ruff format \
            src/gpt_quant/walk_forward_verify_gate.py \
            tests/test_walk_forward_selected_path_cache.py \
            benchmarks/run_walk_forward_target_only_verify.py
          git diff -- \
            src/gpt_quant/walk_forward_verify_gate.py \
            tests/test_walk_forward_selected_path_cache.py \
            benchmarks/run_walk_forward_target_only_verify.py
