name: Hourly Quant Research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hourly-quant-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Capture lint and formatting diagnostics
        run: |
          mkdir -p reports/ci
          set +e
          ruff check . > reports/ci/ruff-check.txt 2>&1
          echo "$?" > reports/ci/ruff-check.status
          ruff format --check . > reports/ci/ruff-format.txt 2>&1
          echo "$?" > reports/ci/ruff-format.status
          exit 0

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics-${{ github.run_number }}
          path: reports/ci/
          if-no-files-found: error
          retention-days: 1

      - name: Enforce lint and formatting
        run: |
          cat reports/ci/ruff-check.txt
          cat reports/ci/ruff-format.txt
          test "$(cat reports/ci/ruff-check.status)" = "0"
          test "$(cat reports/ci/ruff-format.status)" = "0"

      - name: Test
        run: pytest

      - name: Run synthetic sealed-holdout smoke test
        run: python scripts/run_research.py --output-dir reports/synthetic

      - name: Run OKX rolling out-of-sample research
        env:
          OKX_BASE_URL: https://www.okx.com
        run: |
          for instrument in BTC-USDT ETH-USDT; do
            python scripts/run_okx_research.py \
              --inst-id "$instrument" \
              --output-dir "reports/okx/$instrument"
          done

      - name: Upload research reports and data snapshots
        uses: actions/upload-artifact@v4
        with:
          name: quant-research-${{ github.run_number }}
          path: reports/
          if-no-files-found: error
          retention-days: 14
