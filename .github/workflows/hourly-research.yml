name: Hourly Quant Research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hourly-quant-research-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PIP_BOOTSTRAP_VERSION: "26.1.2"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Format proposed data files
        run: |
          ruff format src/gpt_quant/okx_live_evidence.py tests/test_okx_live_evidence.py
          ruff check src/gpt_quant/okx_live_evidence.py tests/test_okx_live_evidence.py
          mkdir -p /tmp/ruff-formatted/src/gpt_quant /tmp/ruff-formatted/tests
          cp src/gpt_quant/okx_live_evidence.py /tmp/ruff-formatted/src/gpt_quant/
          cp tests/test_okx_live_evidence.py /tmp/ruff-formatted/tests/

      - name: Upload temporary formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: temporary-data-formatted-files-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: /tmp/ruff-formatted/
          if-no-files-found: error
          retention-days: 1

      - name: Stop after formatter capture
        run: exit 1
