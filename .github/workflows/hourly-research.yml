name: Hourly Quant Research

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Capture focused pytest
        run: |
          set +e
          pytest -vv tests/test_paper_submission_identity.py tests/test_paper_order_transition.py > focused-pytest.txt 2>&1
          printf 'exit=%s\n' "$?" >> focused-pytest.txt
      - name: Upload focused pytest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: architecture-lifecycle-focused-pytest
          path: focused-pytest.txt
          if-no-files-found: error
          retention-days: 1
