name: Hourly Quant Research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hourly-quant-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Capture PR98 Ruff diagnostics
        run: |
          mkdir -p reports/diagnostics
          ruff format \
            reports/research/portfolio-expected-shortfall-diversification/analysis.py \
            tests/test_portfolio_expected_shortfall_diversification_report.py
          ruff check . --output-format=json > reports/diagnostics/ruff-check.json || true

      - name: Upload PR98 Ruff diagnostics
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: pr98-ruff-${{ github.run_number }}
          path: |
            reports/diagnostics/ruff-check.json
            reports/research/portfolio-expected-shortfall-diversification/analysis.py
            tests/test_portfolio_expected_shortfall_diversification_report.py
          if-no-files-found: error
          retention-days: 1

      - name: Lint and formatting
        run: ruff check . && ruff format --check .

      - name: Test against public OKX data
        env:
          OKX_BASE_URL: https://www.okx.com
        run: pytest

      - name: Run OKX rolling out-of-sample research
        env:
          OKX_BASE_URL: https://www.okx.com
        run: |
          for instrument in BTC-USDT ETH-USDT; do
            python scripts/run_okx_research.py \
              --inst-id "$instrument" \
              --output-dir "reports/okx/$instrument" \
              --manifest-path reports/okx/experiment-manifest.jsonl
          done

      - name: Upload research reports and data snapshots
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: quant-research-${{ github.run_number }}
          path: reports/
          if-no-files-found: error
          retention-days: 14
