name: Hourly Quant Research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hourly-quant-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint and formatting
        run: ruff check . && ruff format --check .

      - name: Test against immutable public OKX fixture
        run: pytest

      - name: Run real-data sealed-holdout smoke test
        run: |
          python - <<'PY'
          import base64
          from pathlib import Path

          source = Path(
              "tests/fixtures/okx/btc_usdt_1dutc_20180111_20191211.csv.gz.b64"
          )
          target = Path("/tmp/btc_usdt_1dutc_20180111_20191211.csv.gz")
          target.write_bytes(base64.b64decode(source.read_text(encoding="ascii"), validate=True))
          PY
          python scripts/run_research.py \
            --csv /tmp/btc_usdt_1dutc_20180111_20191211.csv.gz \
            --output-dir reports/fixture/BTC-USDT

      - name: Run OKX rolling out-of-sample research
        env:
          OKX_BASE_URL: https://www.okx.com
        run: |
          for instrument in BTC-USDT ETH-USDT; do
            python scripts/run_okx_research.py \
              --inst-id "$instrument" \
              --output-dir "reports/okx/$instrument" \
              --manifest-path reports/okx/experiment-manifest.jsonl
          done

      - name: Upload research reports and data snapshots
        uses: actions/upload-artifact@v4
        with:
          name: quant-research-${{ github.run_number }}
          path: reports/
          if-no-files-found: error
          retention-days: 14
