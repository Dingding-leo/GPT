name: Hourly Quant Research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hourly-quant-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint and formatting
        run: ruff check . && ruff format --check .

      - name: Test against public OKX data
        env:
          OKX_BASE_URL: https://www.okx.com
        run: pytest

      - name: Run OKX rolling out-of-sample research
        env:
          OKX_BASE_URL: https://www.okx.com
        run: |
          for instrument in BTC-USDT ETH-USDT; do
            python scripts/run_okx_research.py \
              --inst-id "$instrument" \
              --output-dir "reports/okx/$instrument" \
              --manifest-path reports/okx/experiment-manifest.jsonl
          done

      - name: Upload research reports and data snapshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quant-research-${{ github.run_number }}
          path: reports/
          if-no-files-found: error
          retention-days: 14
