name: Hourly Quant Research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hourly-quant-research-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PIP_BOOTSTRAP_VERSION: "26.1.2"
      MAX_VARIANCE_CONTRIBUTION: "0.75"
      MAX_PAIRWISE_CORRELATION: "0.90"
      SOURCE_ARTIFACT_NAME: "quant-research-source-${{ github.run_number }}-attempt-${{ github.run_attempt }}"
      PORTFOLIO_ARTIFACT_NAME: "quant-portfolio-risk-${{ github.run_number }}-attempt-${{ github.run_attempt }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install "pip==${PIP_BOOTSTRAP_VERSION}"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Capture exact Ruff output
        run: |
          ruff format \
            src/gpt_quant/portfolio_stress.py \
            scripts/run_portfolio_risk.py \
            tests/test_portfolio_stress_correlation.py
          ruff check \
            src/gpt_quant/portfolio_stress.py \
            scripts/run_portfolio_risk.py \
            tests/test_portfolio_stress_correlation.py

      - name: Upload exact Ruff output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-formatter-capture-${{ github.run_id }}
          path: |
            src/gpt_quant/portfolio_stress.py
            scripts/run_portfolio_risk.py
            tests/test_portfolio_stress_correlation.py
          if-no-files-found: error
          retention-days: 1

      - name: Stop after formatter capture
        run: exit 1
