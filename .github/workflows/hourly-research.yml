name: Hourly Quant Research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: hourly-quant-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint and formatting
        run: ruff check . && ruff format --check .

      - name: Test
        run: pytest

      - name: Run sealed-holdout research
        run: python scripts/run_research.py --output-dir reports

      - name: Upload research report
        uses: actions/upload-artifact@v4
        with:
          name: quant-research-${{ github.run_number }}
          path: reports/
          if-no-files-found: error
          retention-days: 14
