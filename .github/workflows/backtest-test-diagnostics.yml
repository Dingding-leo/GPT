name: Backtest Test Diagnostics

on:
  pull_request:
    paths:
      - src/gpt_quant/backtest.py
      - src/gpt_quant/metrics.py
      - src/gpt_quant/walk_forward_report.py
      - tests/test_walk_forward_fee_decomposition.py
      - .github/workflows/backtest-test-diagnostics.yml

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Capture full pytest output
        run: pytest -vv > pytest-output.txt 2>&1 || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: backtest-pytest-diagnostics
          path: pytest-output.txt
          if-no-files-found: error
