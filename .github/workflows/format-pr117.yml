name: Format PR117 targets

on:
  push:
    branches:
      - auto/research/20260722-17-prior-fold-performance-regimes

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[ruff-formatted]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
      - name: Apply Ruff formatting and remove helper
        run: |
          ruff format \
            reports/research/prior-fold-performance-regimes/analysis.py \
            tests/test_prior_fold_performance_regime_report.py
          git rm .github/workflows/format-pr117.yml
      - name: Commit formatted targets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            reports/research/prior-fold-performance-regimes/analysis.py \
            tests/test_prior_fold_performance_regime_report.py
          git commit -m "style(research): apply Ruff formatting [ruff-formatted]"
          git push origin HEAD:auto/research/20260722-17-prior-fold-performance-regimes
