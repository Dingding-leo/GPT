name: Docs Format Repair

on:
  push:
    branches:
      - auto/docs/20260722-01-reproduction-guide

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python -m pip install "ruff>=0.9,<1"
      - run: ruff format tests/test_dependency_audit_documentation.py tests/test_walk_forward_warmup_documentation.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docs-formatted-files
          path: |
            tests/test_dependency_audit_documentation.py
            tests/test_walk_forward_warmup_documentation.py
          if-no-files-found: error
          retention-days: 1
