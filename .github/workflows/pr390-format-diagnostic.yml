name: PR 390 Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Produce canonical diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          mkdir -p /tmp/pr390-format
          python -m ruff check \
            src/gpt_quant/execution_quote_binding_journal.py \
            tests/test_execution_quote_binding_journal.py \
            --output-format=concise \
            > /tmp/pr390-format/lint.txt 2>&1 || true
          python -m ruff format \
            src/gpt_quant/execution_quote_binding_journal.py \
            tests/test_execution_quote_binding_journal.py
          cp src/gpt_quant/execution_quote_binding_journal.py /tmp/pr390-format/
          cp tests/test_execution_quote_binding_journal.py /tmp/pr390-format/
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v6.0.0
        with:
          name: pr390-format-diagnostic
          path: /tmp/pr390-format
          if-no-files-found: error
