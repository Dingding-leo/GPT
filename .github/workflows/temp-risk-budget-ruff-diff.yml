name: Temporary Risk Budget Ruff Diff

on:
  push:
    branches: [auto/research/20260724-08-ex-ante-risk-budget]

permissions:
  contents: read

jobs:
  diff:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Print Ruff formatter diff
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          ruff format --diff \
            reports/research/ex_ante_risk_budget_overlay/analysis.py \
            tests/test_ex_ante_risk_budget_overlay_report.py
