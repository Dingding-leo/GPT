name: Target Path Lint Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"

      - name: Capture lint diagnostics
        shell: bash
        run: |
          set +e
          ruff check \
            src/gpt_quant/walk_forward_target_verify.py \
            src/gpt_quant/walk_forward_verify_gate.py \
            tests/test_walk_forward_report_verification.py \
            --output-format=concise > target-path-lint.txt 2>&1
          status=$?
          printf 'exit_status=%s\n' "$status" >> target-path-lint.txt
          exit 0

      - name: Upload lint diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: target-path-lint-${{ github.run_number }}
          path: target-path-lint.txt
          if-no-files-found: error
          retention-days: 1
