name: Temporary Ruff Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Capture diagnostics
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p /tmp/ruff-diagnostic
          ruff check . > /tmp/ruff-diagnostic/check.txt 2>&1 || true
          ruff format --diff . > /tmp/ruff-diagnostic/format.diff 2>&1 || true
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: temporary-ruff-diagnostic
          path: /tmp/ruff-diagnostic/
          if-no-files-found: error
          retention-days: 1
