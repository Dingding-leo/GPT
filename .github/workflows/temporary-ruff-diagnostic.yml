name: Temporary Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Capture diagnostics
        run: |
          ruff check . > ruff-check.txt 2>&1 || true
          ruff format --diff . > ruff-format.diff 2>&1 || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: temporary-ruff-diagnostic
          path: |
            ruff-check.txt
            ruff-format.diff
          if-no-files-found: error
          retention-days: 1
