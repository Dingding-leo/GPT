name: Security Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-format-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install pinned Ruff
        run: python -m pip install "ruff==0.14.13"
      - name: Capture diagnostics and canonical files
        shell: bash
        run: |
          set +e
          ruff check . > /tmp/ruff-check.txt 2>&1
          check_status=$?
          ruff format --check . > /tmp/ruff-format-check.txt 2>&1
          format_status=$?
          ruff format src/gpt_quant/okx_execution_quote.py tests/test_okx_execution_quote_envelope_security.py
          cp src/gpt_quant/okx_execution_quote.py /tmp/okx_execution_quote.py
          cp tests/test_okx_execution_quote_envelope_security.py /tmp/test_okx_execution_quote_envelope_security.py
          printf 'check_status=%s\nformat_status=%s\n' "$check_status" "$format_status" > /tmp/status.txt
          cat /tmp/status.txt /tmp/ruff-check.txt /tmp/ruff-format-check.txt
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-format-diagnostic
          path: |
            /tmp/status.txt
            /tmp/ruff-check.txt
            /tmp/ruff-format-check.txt
            /tmp/okx_execution_quote.py
            /tmp/test_okx_execution_quote_envelope_security.py
          if-no-files-found: error
          retention-days: 1
