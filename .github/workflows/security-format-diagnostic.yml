name: Security Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Capture Ruff formatter diff
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
          mkdir -p reports/security
          ruff format --diff \
            scripts/dependency_audit_direct_policy.py \
            tests/test_dependency_direct_policy.py \
            > reports/security/ruff-format.diff || true

      - name: Upload formatter diff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-format-diagnostic-${{ github.run_id }}
          path: reports/security/ruff-format.diff
          if-no-files-found: error
