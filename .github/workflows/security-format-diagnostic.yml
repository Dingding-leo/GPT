name: Security Format Diagnostic

on:
  push:
    branches:
      - auto/security/20260722-03-dependency-review-gate

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install formatter
        run: python -m pip install "ruff>=0.9,<1"

      - name: Capture exact Ruff diagnostics
        run: |
          set +e
          mkdir -p reports/security-format
          ruff check . > reports/security-format/ruff-check.txt 2>&1
          printf '%s\n' "$?" > reports/security-format/ruff-check.exit-code
          ruff format --diff . > reports/security-format/ruff-format.diff 2>&1
          printf '%s\n' "$?" > reports/security-format/ruff-format.exit-code
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-format-diagnostic-${{ github.run_number }}-${{ github.run_attempt }}
          path: reports/security-format/
          if-no-files-found: error
          retention-days: 1
