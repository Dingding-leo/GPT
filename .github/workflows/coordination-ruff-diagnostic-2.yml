name: Coordination Ruff Diagnostic 2

on:
  pull_request:
    branches: [auto/live/20260724-06-okx-top-of-book]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Generate canonical Ruff patch
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install "ruff==0.16.0"
          ruff check . --fix
          ruff format .
          git diff --binary > /tmp/coordination-ruff-2.patch
          test -s /tmp/coordination-ruff-2.patch
          sha256sum /tmp/coordination-ruff-2.patch > /tmp/coordination-ruff-2.patch.sha256

      - name: Upload canonical patch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coordination-ruff-patch-2
          path: |
            /tmp/coordination-ruff-2.patch
            /tmp/coordination-ruff-2.patch.sha256
          if-no-files-found: error
          retention-days: 1
