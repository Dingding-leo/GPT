name: Temporary Pytest Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Capture focused pytest diagnostics
        run: |
          pytest -vv \
            tests/test_okx_execution_quote.py \
            tests/test_okx_execution_quote_replay.py \
            tests/test_okx_execution_quote_origin_security.py \
            tests/test_okx_execution_quote_redirect_security.py \
            tests/test_okx_public_redirect_security.py \
            tests/test_execution_quote.py \
            > pytest-output.txt 2>&1 || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pytest-diagnostic-${{ github.run_number }}
          path: pytest-output.txt
          if-no-files-found: error
