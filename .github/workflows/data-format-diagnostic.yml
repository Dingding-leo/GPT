name: Data Format Diagnostic

on:
  push:
    branches:
      - auto/data/20260724-11-instrument-request-rtt

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Format bounded files
        run: |
          ruff format \
            src/gpt_quant/okx_order_constraints.py \
            tests/test_okx_instrument_request_round_trip.py
      - name: Upload canonical files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatted-data-files
          path: |
            src/gpt_quant/okx_order_constraints.py
            tests/test_okx_instrument_request_round_trip.py
          if-no-files-found: error
          retention-days: 1
