name: Data Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"

      - name: Produce canonical files
        run: |
          ruff format \
            src/gpt_quant/okx_instruments.py \
            tests/test_okx_instrument_origin_security.py

      - name: Upload canonical files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: data-format-diagnostic
          path: |
            src/gpt_quant/okx_instruments.py
            tests/test_okx_instrument_origin_security.py
          if-no-files-found: error
          retention-days: 1
