name: Fix Channel Breakout Result Structure

on:
  push:
    branches:
      - auto/research/20260724-15-breakout-trend

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Repair result object boundaries
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("reports/research/channel-breakout-trend-1h/result.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          markets = data["markets"]
          for key in (
              "paper_testable",
              "prospective_execution_diagnostics",
              "rejection_reasons",
              "verdict",
          ):
              if key in markets:
                  data[key] = markets.pop(key)
          json.loads(json.dumps(data, allow_nan=False))
          path.write_text(
              json.dumps(data, indent=2, sort_keys=True, allow_nan=False) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit repair
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/research/channel-breakout-trend-1h/result.json
          git commit -m "fix(research): restore channel result top-level fields"
          git push
