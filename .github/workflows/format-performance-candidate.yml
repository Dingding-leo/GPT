name: Format Performance Candidate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Format focused files
        run: |
          python -m pip install "ruff==0.16.0"
          ruff check --fix \
            src/gpt_quant/walk_forward.py \
            tests/test_walk_forward_selection_score.py \
            benchmarks/run_walk_forward_selection_score.py
          ruff format \
            src/gpt_quant/walk_forward.py \
            tests/test_walk_forward_selection_score.py \
            benchmarks/run_walk_forward_selection_score.py

      - name: Commit canonical formatting
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- \
            src/gpt_quant/walk_forward.py \
            tests/test_walk_forward_selection_score.py \
            benchmarks/run_walk_forward_selection_score.py; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/gpt_quant/walk_forward.py \
            tests/test_walk_forward_selection_score.py \
            benchmarks/run_walk_forward_selection_score.py
          git commit -m "style: apply canonical Ruff formatting"
          git push \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:auto/performance/20260724-11-candidate-score-fast-path"
