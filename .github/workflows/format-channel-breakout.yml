name: Format Channel Breakout Research

on:
  push:
    branches:
      - auto/research/20260724-15-breakout-trend

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - run: |
          ruff check --fix tests/test_channel_breakout_trend_1h_report.py
          ruff format tests/test_channel_breakout_trend_1h_report.py
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/test_channel_breakout_trend_1h_report.py
          git commit -m "style(research): format channel breakout test"
          git push
