name: Docs Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Generate canonical files
        run: |
          python -m pip install -e ".[dev]"
          ruff check --fix examples/signal_intent_timing.py tests/test_signal_intent_timing_documentation.py
          ruff format examples/signal_intent_timing.py tests/test_signal_intent_timing_documentation.py
          python -m py_compile examples/signal_intent_timing.py tests/test_signal_intent_timing_documentation.py
      - name: Upload canonical files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-format-canonical
          path: |
            examples/signal_intent_timing.py
            tests/test_signal_intent_timing_documentation.py
          if-no-files-found: error
          retention-days: 1
