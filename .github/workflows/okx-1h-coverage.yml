name: OKX 1H Data Coverage

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: okx-1h-data-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out research branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: true
          ref: auto/research/20260724-15-cross-sectional-leader
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Reassemble exact source
        run: |
          set -euo pipefail
          cat .tmp/cross-sectional/analysis.part* > \
            reports/research/cross-sectional-leader-rotation-1h/analysis.py
          cat .tmp/cross-sectional/test_report.part* > \
            reports/research/cross-sectional-leader-rotation-1h/test_report.py

      - name: Apply repository Ruff rules
        run: |
          set -euo pipefail
          ruff check --fix reports/research/cross-sectional-leader-rotation-1h
          ruff format reports/research/cross-sectional-leader-rotation-1h
          ruff check reports/research/cross-sectional-leader-rotation-1h
          ruff format --check reports/research/cross-sectional-leader-rotation-1h

      - name: Validate focused report
        run: |
          set -euo pipefail
          python -m py_compile \
            reports/research/cross-sectional-leader-rotation-1h/analysis.py \
            reports/research/cross-sectional-leader-rotation-1h/test_report.py
          pytest -q reports/research/cross-sectional-leader-rotation-1h/test_report.py

      - name: Commit complete formatted source
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            reports/research/cross-sectional-leader-rotation-1h/analysis.py \
            reports/research/cross-sectional-leader-rotation-1h/test_report.py
          git commit -m "research: restore complete formatted leader-rotation analysis"
          git push origin HEAD:auto/research/20260724-15-cross-sectional-leader
