name: Risk Lint Diagnostic

on:
  pull_request:
    paths:
      - "src/gpt_quant/portfolio_underlying_risk.py"
      - "tests/test_portfolio_underlying_risk.py"
      - ".github/workflows/risk-lint-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Capture lint diagnostics
        run: |
          ruff check . > lint.txt 2>&1 || true
          ruff format --check . > format.txt 2>&1 || true
      - name: Upload diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: risk-lint-diagnostics
          path: |
            lint.txt
            format.txt
          if-no-files-found: error
          retention-days: 1
