name: Performance Lint Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-report:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check \
            src/gpt_quant/walk_forward_verify_gate.py \
            tests/test_walk_forward_selected_path_cache.py \
            benchmarks/run_walk_forward_selected_path_cache.py \
            > ruff-check.txt 2>&1
          printf '\n--- format check ---\n' >> ruff-check.txt
          ruff format --check \
            src/gpt_quant/walk_forward_verify_gate.py \
            tests/test_walk_forward_selected_path_cache.py \
            benchmarks/run_walk_forward_selected_path_cache.py \
            >> ruff-check.txt 2>&1
          exit 0

      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-ruff-diagnostics
          path: ruff-check.txt
          if-no-files-found: error
          retention-days: 1
