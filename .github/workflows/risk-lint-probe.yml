name: Risk Lint Probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture bounded lint and test evidence
        shell: bash
        run: |
          set +e
          ruff check \
            src/gpt_quant/paper_risk_session_gate.py \
            tests/test_paper_risk_session_genesis.py \
            --output-format=json > ruff-check.json
          echo "$?" > ruff-check.exit
          ruff format --check \
            src/gpt_quant/paper_risk_session_gate.py \
            tests/test_paper_risk_session_genesis.py \
            > ruff-format.txt 2>&1
          echo "$?" > ruff-format.exit
          pytest -q \
            tests/test_paper_risk_kill_switch.py \
            tests/test_paper_risk_session_gate.py \
            tests/test_paper_risk_session_genesis.py \
            > pytest.txt 2>&1
          echo "$?" > pytest.exit
          exit 0

      - name: Upload lint evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-lint-probe-${{ github.run_number }}
          path: |
            ruff-check.json
            ruff-check.exit
            ruff-format.txt
            ruff-format.exit
            pytest.txt
            pytest.exit
          if-no-files-found: error
          retention-days: 1
