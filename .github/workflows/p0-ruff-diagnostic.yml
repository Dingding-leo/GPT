name: P0 Ruff Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: p0-ruff-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Capture exact Ruff diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install "ruff>=0.9,<1"
          set +e
          ruff check . > ruff-check.txt 2>&1
          check_status=$?
          ruff format --check --diff . > ruff-format.txt 2>&1
          format_status=$?
          set -e
          printf 'check_status=%s\nformat_status=%s\n' "$check_status" "$format_status" > status.txt

      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: p0-ruff-diagnostic-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            ruff-check.txt
            ruff-format.txt
            status.txt
          if-no-files-found: error
          retention-days: 1
