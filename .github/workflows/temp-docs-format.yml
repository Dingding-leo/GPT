name: Temporary Docs Formatter

on:
  push:
    branches:
      - auto/docs/20260722-01-reproduction-guide

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[ruff-formatted]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Apply Ruff fixes
        run: |
          ruff check --fix tests/test_okx_holdout_documentation.py
          ruff format tests/test_okx_holdout_documentation.py
      - name: Commit corrected file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_okx_holdout_documentation.py
          if ! git diff --cached --quiet; then
            git commit -m "style(docs): apply Ruff formatting [ruff-formatted]"
            git push origin HEAD:auto/docs/20260722-01-reproduction-guide
          fi
