name: Temporary PR150 Formatter

on:
  push:
    branches:
      - auto/research/20260723-00-best-fold-exclusion

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[ruff-formatted]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Apply Ruff formatting
        run: ruff format reports/research/best-fold-exclusion/analysis.py tests/test_best_fold_exclusion_report.py
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/research/best-fold-exclusion/analysis.py tests/test_best_fold_exclusion_report.py
          if ! git diff --cached --quiet; then
            git commit -m "style(research): apply Ruff formatting [ruff-formatted]"
            git push origin HEAD:auto/research/20260723-00-best-fold-exclusion
          fi
