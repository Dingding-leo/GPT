name: P0 Pytest Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: p0-pytest-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Capture exact pytest failure
        shell: bash
        env:
          OKX_BASE_URL: https://www.okx.com
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          set +e
          pytest -vv > pytest.txt 2>&1
          pytest_status=$?
          set -e
          printf 'pytest_status=%s\n' "$pytest_status" > status.txt

      - name: Upload pytest diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: p0-pytest-diagnostic-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: |
            pytest.txt
            status.txt
          if-no-files-found: error
          retention-days: 1
