name: CI Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff==0.14.14"
      - run: |
          ruff check . --output-format full > ruff-check.txt || true
          ruff format --diff . > ruff-format.diff || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-format-diagnostic
          path: |
            ruff-check.txt
            ruff-format.diff
          if-no-files-found: error
          retention-days: 1
