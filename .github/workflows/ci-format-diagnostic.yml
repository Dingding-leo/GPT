name: CI Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install formatter
        run: python -m pip install "ruff==0.16.0"

      - name: Format focused files
        run: |
          ruff check \
            scripts/build_intraday_1h_cross_market_gate.py \
            tests/test_intraday_1h_cross_market_gate.py \
            tests/test_intraday_research_profile.py \
            > ruff-check-before.txt 2>&1 || true
          ruff format \
            scripts/build_intraday_1h_cross_market_gate.py \
            tests/test_intraday_1h_cross_market_gate.py \
            tests/test_intraday_research_profile.py
          ruff check \
            scripts/build_intraday_1h_cross_market_gate.py \
            tests/test_intraday_1h_cross_market_gate.py \
            tests/test_intraday_research_profile.py \
            > ruff-check-after.txt 2>&1 || true

      - name: Upload formatted files and diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-cross-market-format-diagnostic
          path: |
            scripts/build_intraday_1h_cross_market_gate.py
            tests/test_intraday_1h_cross_market_gate.py
            tests/test_intraday_research_profile.py
            ruff-check-before.txt
            ruff-check-after.txt
          if-no-files-found: error
          retention-days: 1
