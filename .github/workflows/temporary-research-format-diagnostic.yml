name: Temporary Research Format Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: Show exact formatter diff
        run: |
          ruff format --diff \
            reports/research/sortino-vs-volatility-benchmark/analysis.py \
            tests/test_sortino_vs_volatility_benchmark_report.py
