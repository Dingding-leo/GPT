name: Risk Test Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Run focused tests and retain output
        id: focused
        shell: bash
        run: |
          set +e
          pytest -vv \
            tests/test_portfolio_underlying_risk.py \
            tests/test_portfolio_path_risk_budget.py \
            2>&1 | tee focused-test-output.txt
          status=${PIPESTATUS[0]}
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload focused output
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: risk-test-output-${{ github.run_number }}-attempt-${{ github.run_attempt }}
          path: focused-test-output.txt
          if-no-files-found: error
          retention-days: 1
