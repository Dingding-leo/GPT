name: Performance Cache Scaling Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
          cache: pip
      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"
          python -m pip check
      - name: Run focused regressions
        run: pytest -q tests/test_walk_forward_cache_scaling_benchmark.py
      - name: Generate current immutable BTC research input
        run: |
          python scripts/run_okx_research.py \
            --inst-id BTC-USDT \
            --output-dir reports/okx/BTC-USDT \
            --manifest-path reports/okx/experiment-manifest.jsonl
      - name: Measure candidate cache scaling
        run: |
          mkdir -p reports/performance
          sha256sum reports/okx/BTC-USDT/snapshot/okx-BTC-USDT-1Dutc.csv \
            | tee reports/performance/cache-scaling-input.sha256
          python benchmarks/run_walk_forward_cache_scaling.py \
            --csv reports/okx/BTC-USDT/snapshot/okx-BTC-USDT-1Dutc.csv \
            --config config/okx_research.json \
            --axis-sizes 1,2,3,4 \
            --repetitions 3 \
            | tee reports/performance/cache-scaling.txt
      - name: Upload benchmark evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cache-scaling-${{ github.run_id }}
          path: reports/performance
          if-no-files-found: error
          retention-days: 14
