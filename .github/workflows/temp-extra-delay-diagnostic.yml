name: Temporary Extra Delay Diagnostic

on:
  push:
    branches:
      - auto/research/20260722-11-extra-execution-delay

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[pytest-diagnostic]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Capture focused test result
        run: |
          mkdir -p diagnostics
          set +e
          pytest -q tests/test_extra_execution_delay_report.py \
            > diagnostics/extra-delay-pytest.txt 2>&1
          status=$?
          echo "pytest_exit_code=$status" >> diagnostics/extra-delay-pytest.txt
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/extra-delay-pytest.txt
          git commit -m "test(research): capture focused failure [pytest-diagnostic]"
          git push origin HEAD:auto/research/20260722-11-extra-execution-delay
