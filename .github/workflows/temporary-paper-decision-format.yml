name: Temporary Paper Decision Format

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    if: github.head_ref == 'auto/live/20260724-05-atomic-paper-decision'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Install formatter
        run: python -m pip install -e ".[dev]"
      - name: Format focused files
        run: |
          ruff format src/gpt_quant/paper_decision_store.py tests/test_paper_decision_store.py
          ruff check --fix src/gpt_quant/paper_decision_store.py tests/test_paper_decision_store.py
          ruff format src/gpt_quant/paper_decision_store.py tests/test_paper_decision_store.py
      - name: Upload formatted files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: paper-decision-formatted-${{ github.run_id }}
          path: |
            src/gpt_quant/paper_decision_store.py
            tests/test_paper_decision_store.py
          if-no-files-found: error
          retention-days: 1
