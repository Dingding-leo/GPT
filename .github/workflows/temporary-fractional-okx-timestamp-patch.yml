name: Temporary Fractional OKX Timestamp Patch

on:
  push:
    branches:
      - auto/data/20260722-17-reject-fractional-okx-timestamps

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -e ".[dev]"

      - name: Apply bounded timestamp patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/gpt_quant/okx.py")
          source = source_path.read_text(encoding="utf-8")
          marker = "\ndef parse_okx_candle_rows(rows: Sequence[Sequence[Any]]) -> pd.DataFrame:\n"
          helper = '''

          def _coerce_okx_timestamp_ms(value: Any) -> int:
              """Return an exact integer millisecond timestamp without truncation."""

              if isinstance(value, (bool, np.bool_)):
                  raise ValueError("timestamp must be an integer millisecond value")
              if isinstance(value, (int, np.integer)):
                  return int(value)
              if isinstance(value, (float, np.floating)):
                  numeric = float(value)
                  if not np.isfinite(numeric) or not numeric.is_integer():
                      raise ValueError("timestamp must be an integer millisecond value")
                  return int(numeric)
              if isinstance(value, str) and value.isascii() and value.isdecimal():
                  return int(value)
              raise ValueError("timestamp must be an integer millisecond value")
          '''
          assert source.count(marker) == 1
          source = source.replace(marker, helper + marker, 1)

          parser_old = '            pd.to_numeric(frame.pop("ts"), errors="coerce"),\n'
          parser_new = '            frame.pop("ts").map(_coerce_okx_timestamp_ms),\n'
          assert source.count(parser_old) == 1
          source = source.replace(parser_old, parser_new, 1)

          downloader_old = "                timestamp = int(row[0])\n"
          downloader_new = "                timestamp = _coerce_okx_timestamp_ms(row[0])\n"
          assert source.count(downloader_old) == 1
          source = source.replace(downloader_old, downloader_new, 1)
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/test_okx_parser_value_validation.py")
          tests = test_path.read_text(encoding="utf-8")
          import_old = "from gpt_quant.okx import parse_okx_candle_rows\n"
          import_new = "from gpt_quant.okx import fetch_okx_history_candles, parse_okx_candle_rows\n"
          assert tests.count(import_old) == 1
          tests = tests.replace(import_old, import_new, 1)
          addition = '''

          @pytest.mark.parametrize("representation", ["text", "number"])
          def test_okx_parser_rejects_fractional_millisecond_timestamp(
              representation: str,
          ) -> None:
              corrupted: list[object] = _real_confirmed_okx_row()
              original = int(corrupted[0])
              corrupted[0] = f"{original}.5" if representation == "text" else original + 0.5

              with pytest.raises(ValueError, match="invalid timestamp"):
                  parse_okx_candle_rows([corrupted])


          def test_okx_downloader_rejects_fractional_numeric_timestamp() -> None:
              corrupted: list[object] = _real_confirmed_okx_row()
              corrupted[0] = int(corrupted[0]) + 0.5

              def fake_getter(url: str, timeout: float) -> dict[str, object]:
                  return {"code": "0", "msg": "", "data": [corrupted]}

              with pytest.raises(ValueError, match="invalid timestamp"):
                  fetch_okx_history_candles(
                      limit=1,
                      max_pages=1,
                      pause_seconds=0.0,
                      get_json=fake_getter,
                  )


          def test_okx_parser_preserves_integral_numeric_timestamp_compatibility() -> None:
              compatible: list[object] = _real_confirmed_okx_row()
              expected_timestamp_ms = int(compatible[0])
              compatible[0] = float(expected_timestamp_ms)

              parsed = parse_okx_candle_rows([compatible])

              assert parsed.index[0].value // 1_000_000 == expected_timestamp_ms
          '''
          assert "test_okx_parser_rejects_fractional_millisecond_timestamp" not in tests
          tests += addition
          test_path.write_text(tests, encoding="utf-8")
          PY

      - name: Format and verify focused change
        run: |
          ruff format src/gpt_quant/okx.py tests/test_okx_parser_value_validation.py
          ruff check src/gpt_quant/okx.py tests/test_okx_parser_value_validation.py
          ruff format --check src/gpt_quant/okx.py tests/test_okx_parser_value_validation.py
          pytest -q tests/test_okx_parser_value_validation.py

      - name: Commit final focused change
        run: |
          rm .github/workflows/temporary-fractional-okx-timestamp-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/gpt_quant/okx.py tests/test_okx_parser_value_validation.py \
            .github/workflows/temporary-fractional-okx-timestamp-patch.yml
          git commit -m "fix(data): reject fractional OKX timestamps"
          git push origin HEAD:auto/data/20260722-17-reject-fractional-okx-timestamps
