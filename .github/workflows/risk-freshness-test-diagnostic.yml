name: Risk freshness test diagnostic

on:
  pull_request:
    paths:
      - "src/gpt_quant/portfolio_freshness_risk.py"
      - "tests/test_portfolio_freshness_risk.py"
      - ".github/workflows/risk-freshness-test-diagnostic.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.13"
      - name: Install focused tools
        run: python -m pip install pytest==8.4.2
      - name: Capture focused test output
        shell: bash
        run: |
          set +e
          PYTHONPATH=src python -m pytest -q \
            tests/test_portfolio_target_risk.py \
            tests/test_portfolio_freshness_risk.py \
            > risk-freshness-test.log 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> risk-freshness-test.log
          exit 0
      - name: Publish diagnostic and remove workflow
        run: |
          set -euo pipefail
          rm .github/workflows/risk-freshness-test-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add risk-freshness-test.log .github/workflows/risk-freshness-test-diagnostic.yml
          git commit -m "ci(risk): capture freshness test failure"
          git push origin HEAD:${{ github.head_ref }}
